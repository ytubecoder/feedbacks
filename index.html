<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedbacks — Screen + Voice Capture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Views ── */
  .view { display: none; }
  .view.active { display: flex; flex-direction: column; }

  /* ── Setup View ── */
  #setupView {
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  #setupView h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.2rem;
  }

  #setupView .subtitle {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 2rem;
  }

  .readiness-checks {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    min-width: 300px;
    margin-bottom: 1.5rem;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.75rem;
    background: #111;
    border: 1px solid #272727;
    border-radius: 6px;
  }

  .check-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #666;
    flex-shrink: 0;
  }
  .check-dot.green { background: #4ade80; }
  .check-dot.blue { background: #60a5fa; }
  .check-dot.red { background: #f87171; }

  .check-label {
    font-size: 0.8rem;
    color: #ccc;
    flex: 1;
  }

  .check-value {
    font-size: 0.7rem;
    color: #888;
  }
  .check-value.green { color: #4ade80; }
  .check-value.blue { color: #60a5fa; }
  .check-value.red { color: #f87171; }

  /* Mic level bars */
  .mic-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
  }
  .mic-bars.large { height: 14px; }
  .mic-bars.mini { height: 10px; }
  .mic-bar {
    border-radius: 1px;
    background: #333;
    transition: height 0.08s ease-out;
  }
  .mic-bars.large .mic-bar { width: 3px; }
  .mic-bars.mini .mic-bar { width: 2px; }
  .mic-bar.active { background: #4ade80; }

  #apiKeyRow {
    display: none;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  #apiKeyRow label { font-size: 0.75rem; color: #888; }
  #apiKeyRow input {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 5px;
    color: #e0e0e0;
    padding: 0.35rem 0.6rem;
    font-size: 0.8rem;
    width: 240px;
    outline: none;
  }
  #apiKeyRow input:focus { border-color: #666; }

  .setup-config {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .setup-config input {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 5px;
    color: #e0e0e0;
    padding: 0.35rem 0.6rem;
    font-size: 0.8rem;
    width: 140px;
    outline: none;
  }
  .setup-config input:focus { border-color: #666; }

  button {
    background: #222;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 0.5rem 1.25rem;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover:not(:disabled) { background: #333; border-color: #666; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  #startBtn {
    background: #1a6b3c;
    border-color: #2a8b4c;
    color: #fff;
    padding: 0.6rem 2rem;
    font-size: 0.95rem;
    font-weight: 500;
  }
  #startBtn:hover:not(:disabled) { background: #1f7d46; }

  /* ── Recording View ── */
  #recordingView {
    min-height: 100vh;
  }

  .done-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #2a6b3a;
    background: #0d1f0d;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .done-bar-left { display: flex; align-items: center; gap: 0.5rem; }
  .done-bar-right { display: flex; align-items: center; gap: 0.4rem; }
  .done-bar-title { font-size: 0.8rem; color: #6bff8b; font-weight: 600; }
  .done-bar-summary { font-size: 0.7rem; color: #888; }
  .done-bar-path {
    display: inline-flex; align-items: center; gap: 0.3rem;
    background: #111; border: 1px solid #272727; border-radius: 4px;
    padding: 0.2rem 0.5rem; cursor: pointer; font-size: 0.65rem;
  }
  .done-bar-path:hover { border-color: #444; }
  .done-bar-path code { color: #58a6ff; }
  .done-bar-path .copy-btn {
    color: #666; border: 1px solid #333; border-radius: 2px;
    padding: 0 0.2rem; background: none; cursor: pointer; font-size: 0.6rem;
  }
  .done-bar button {
    background: #1a3c6b; border: 1px solid #2a4c8b; color: #fff;
    padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; cursor: pointer;
  }
  .done-bar button:hover { background: #1f4a7d; }

  .rec-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #222;
    background: #0d0d0d;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .rec-header-left {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  #stopBtn {
    background: #6b1a1a;
    border: 1px solid #8b2a2a;
    color: #fff;
    padding: 0.25rem 0.7rem;
    border-radius: 5px;
    font-size: 0.75rem;
  }
  #stopBtn:hover { background: #7d1f1f; }

  .rec-indicator {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }

  .rec-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff4444;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #recTime {
    font-size: 0.75rem;
    color: #ff6b6b;
    font-weight: 500;
    font-family: monospace;
  }

  .rec-header-right {
    display: flex;
    gap: 0.75rem;
    font-size: 0.7rem;
    color: #666;
  }

  /* Status strip */
  .status-strip {
    display: flex;
    gap: 0.4rem;
    padding: 0.35rem 0.75rem;
    border-bottom: 1px solid #1a1a1a;
    background: #0a0a0a;
    flex-wrap: wrap;
    align-items: center;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.65rem;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    background: #151515;
    border: 1px solid #252525;
    color: #888;
  }
  .status-pill .pill-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-pill.green { color: #4ade80; border-color: #1a3a1a; }
  .status-pill.green .pill-dot { background: #4ade80; }
  .status-pill.blue { color: #58a6ff; border-color: #1a2a4a; }
  .status-pill.blue .pill-dot { background: #58a6ff; }
  .status-pill.red { color: #f87171; border-color: #3a1a1a; }
  .status-pill.red .pill-dot { background: #f87171; }
  .status-pill.gray { color: #666; border-color: #222; }
  .status-pill.gray .pill-dot { background: #666; }

  /* Timeline feed */
  .timeline-feed {
    flex: 1;
    overflow-y: auto;
    padding: 0.4rem 0.6rem;
  }

  .tl-entry {
    display: flex;
    gap: 0.4rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #151515;
    align-items: flex-start;
  }

  .tl-time {
    color: #555;
    font-family: monospace;
    font-size: 0.65rem;
    min-width: 32px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .tl-badge {
    font-size: 0.6rem;
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .tl-badge.img { background: #1a3a1a; color: #3fb950; border: 1px solid #2a5a2a; }
  .tl-badge.stt { background: #1a2a4a; color: #58a6ff; border: 1px solid #2a4a6a; }

  .tl-body {
    flex: 1;
    min-width: 0;
  }

  .tl-body img {
    max-width: 180px;
    max-height: 101px;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    display: block;
  }

  .tl-body .tl-text {
    font-size: 0.75rem;
    color: #bbb;
    line-height: 1.4;
    word-break: break-word;
  }

  .tl-entry.pending { opacity: 0.4; }
  .tl-entry.pending .tl-text { font-style: italic; color: #555; }

  /* Diagnostics */
  .diagnostics {
    border-top: 1px solid #1a1a1a;
    padding: 0.3rem 0.75rem;
    background: #0a0a0a;
  }
  .diagnostics summary {
    cursor: pointer;
    color: #555;
    font-size: 0.7rem;
  }
  .diagnostics .diag-summary {
    padding: 0.3rem 0;
    color: #444;
    font-family: monospace;
    font-size: 0.65rem;
  }
  .diagnostics .log {
    max-height: 150px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.7rem;
    color: #555;
    line-height: 1.5;
    padding-top: 0.25rem;
    border-top: 1px solid #1a1a1a;
  }
  .log .error { color: #ff6b6b; }
  .log .success { color: #6bff8b; }
  .log .info { color: #6bb5ff; }

  /* ── Done View ── */
  #doneView {
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  .done-heading {
    font-size: 1.1rem;
    color: #6bff8b;
    margin-bottom: 0.3rem;
  }

  #doneSummary {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 1rem;
  }

  .done-path {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: #111;
    border: 1px solid #272727;
    border-radius: 6px;
    padding: 0.4rem 0.75rem;
    margin-bottom: 1.5rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .done-path:hover { border-color: #444; }

  #donePathText {
    font-family: monospace;
    font-size: 0.75rem;
    color: #58a6ff;
    word-break: break-all;
  }

  .copy-btn {
    font-size: 0.7rem;
    color: #666;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 0.1rem 0.3rem;
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .copy-btn:hover { color: #aaa; border-color: #555; }

  .done-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }

  .done-actions button {
    padding: 0.35rem 1rem;
    border-radius: 6px;
    font-size: 0.8rem;
  }

  #downloadBtn {
    background: #1a3c6b;
    border-color: #2a4c8b;
    color: #fff;
  }
  #downloadBtn:hover { background: #234d80; }

  #newSessionBtn {
    background: #1a6b3c;
    border-color: #2a8b4c;
    color: #fff;
  }
  #newSessionBtn:hover { background: #1f7d46; }

  /* Hidden capture video */
  #captureVideo { display: none; }
</style>
</head>
<body>

<!-- ═══ Setup View ═══ -->
<div id="setupView" class="view active">
  <h1>Feedbacks</h1>
  <p class="subtitle">Screen + voice capture for AI feedback</p>

  <div class="readiness-checks">
    <div class="check-row">
      <div class="check-dot" id="sttDot"></div>
      <span class="check-label">Speech-to-text</span>
      <span class="check-value" id="sttValue">Checking...</span>
    </div>
    <div class="check-row">
      <div class="check-dot" id="micDot"></div>
      <span class="check-label">Microphone</span>
      <div class="mic-bars large" id="micBarsSetup">
        <div class="mic-bar" style="height:3px"></div>
        <div class="mic-bar" style="height:3px"></div>
        <div class="mic-bar" style="height:3px"></div>
        <div class="mic-bar" style="height:3px"></div>
        <div class="mic-bar" style="height:3px"></div>
      </div>
    </div>
  </div>

  <div id="apiKeyRow">
    <label>OpenAI Key:</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
  </div>

  <div class="setup-config">
    <input type="text" id="ticketId" placeholder="Ticket ID (optional)" maxlength="20" autocomplete="off" spellcheck="false" />
    <span id="ticketBadge" aria-live="polite" style="display:none; font-size:0.7rem; color:#60a5fa; padding:0.15rem 0.4rem; border-radius:4px; background:#0d1f35; border:1px solid #1a3a60;"></span>
    <button id="ticketClear" aria-label="Clear ticket ID" style="display:none; background:none; border:none; color:#666; font-size:1rem; cursor:pointer; padding:0 0.25rem;" onclick="clearTicketId()">×</button>
  </div>

  <button id="startBtn" onclick="startSession()">Start Session</button>
</div>

<!-- ═══ Recording View ═══ -->
<div id="recordingView" class="view">
  <!-- Header -->
  <!-- Done bar (replaces header after recording) -->
  <div id="doneBar" class="done-bar" style="display:none;">
    <div class="done-bar-left">
      <span class="done-bar-title">Session Saved</span>
      <span id="doneBarSummary" class="done-bar-summary"></span>
    </div>
    <div class="done-bar-right">
      <span class="done-bar-path" onclick="copyPath()">
        <code id="doneBarPath"></code>
        <span class="copy-btn" id="copyBtn2">copy</span>
      </span>
      <button id="downloadBtn2" onclick="downloadZip()">ZIP</button>
      <button id="newSessionBtn2" onclick="newSession()">New</button>
    </div>
  </div>

  <div id="recHeader" class="rec-header">
    <div class="rec-header-left">
      <button id="stopBtn" onclick="stopSession()">Stop</button>
      <span class="rec-indicator">
        <span class="rec-dot"></span>
        <span id="recTime">0:00</span>
      </span>
      <div class="mic-bars mini" id="micBarsRec">
        <div class="mic-bar" style="height:2px"></div>
        <div class="mic-bar" style="height:2px"></div>
        <div class="mic-bar" style="height:2px"></div>
      </div>
    </div>
    <div class="rec-header-right">
      <span id="headerImgCount">0 img</span>
      <span id="headerSttCount">0/0 stt</span>
    </div>
  </div>

  <!-- Status strip -->
  <div class="status-strip" id="statusStrip">
    <span class="status-pill green"><span class="pill-dot"></span><span id="stripStt">STT local</span></span>
    <span class="status-pill green"><span class="pill-dot"></span><span id="stripMic">Mic</span></span>
    <span class="status-pill green"><span class="pill-dot"></span><span id="stripCapture">Capture --</span></span>
    <span class="status-pill blue"><span class="pill-dot"></span><span id="stripImgCount">0 img</span></span>
    <span class="status-pill blue"><span class="pill-dot"></span><span id="stripSttCount">0/0 stt</span></span>
    <span class="status-pill gray"><span class="pill-dot"></span><span id="stripDedup">0 deduped</span></span>
  </div>

  <!-- Timeline -->
  <div class="timeline-feed" id="timelineFeed"></div>

  <!-- Diagnostics -->
  <div class="diagnostics">
    <details>
      <summary>Diagnostics</summary>
      <div class="diag-summary" id="diagSummary">--</div>
      <div class="log" id="log"></div>
    </details>
  </div>
</div>

<!-- ═══ Done View ═══ -->
<div id="doneView" class="view">
  <div class="done-heading">Session Saved</div>
  <div id="doneSummary">--</div>
  <div class="done-path" onclick="copyPath()">
    <span id="donePathText">/path/to/session</span>
    <span class="copy-btn" id="copyBtn">copy</span>
  </div>
  <div id="retroTicket" role="status" style="display:none; font-size:0.8rem; color:#ffb86b; background:#3a3015; border:1px solid #6b5a2a; border-radius:6px; padding:0.4rem 0.75rem; margin-bottom:0.5rem; align-items:center; gap:0.5rem;">
    No ticket linked.
    <input type="text" id="retroTicketId" placeholder="B-05" maxlength="20" autocomplete="off" style="background:#1a1a1a; border:1px solid #555; border-radius:4px; color:#e0e0e0; padding:0.2rem 0.4rem; font-size:0.8rem; width:80px;" />
    <span style="color:#998050; font-size:0.75rem;">Link it (renames the ZIP)</span>
  </div>
  <div class="done-actions">
    <button id="downloadBtn" onclick="downloadZip()">Download ZIP</button>
    <button id="newSessionBtn" onclick="newSession()">New Session</button>
  </div>
</div>

<!-- Hidden video for getDisplayMedia -->
<video id="captureVideo" autoplay muted playsinline></video>

<script>
// ── State ──
let screenStream = null;
let screenshots = []; // { timestamp, dataUrl, clickPoint?, boundingBox? }
let sessionStartTime = 0;
let durationIntervalId = null;
let screenshotIntervalId = null;
let lastFrameData = null;
let isRecording = false;
let zipBlob = null;
let captureInProgress = false;
let dedupCount = 0;
let statusStripIntervalId = null;
let savedPath = '';
let micAudioCtx = null;
let micAnalyser = null;
let micMeterRafId = null;

// Whisper connection state
let whisperLocal = false;
let whisperCheckId = null;
const WHISPER_LOCAL_URL = 'http://localhost:8081';
const WHISPER_CLOUD_URL = 'https://api.openai.com';
const CHUNK_DURATION = 10000; // 10 seconds
const CAPTURE_INTERVAL = 1000; // auto-screenshot every second, dedup filters unchanged frames

// Chunked transcription state
let chunkRecorder = null;
let chunkAudioParts = [];
let chunkStartTime = 0;
let chunkRotationId = null;
let chunkCount = 0;
let transcribedCount = 0;
let transcriptSegments = []; // { start, end, text } accumulated
let pendingTranscriptions = []; // promises for in-flight transcriptions

// Mic stream (may be started in setup for preview)
let micStreamRef = null;

// ── Elements ──
const $ = id => document.getElementById(id);

// ── Logging ──
const logHistory = [];
function log(msg, cls = '') {
  const ts = new Date().toLocaleTimeString();
  const entry = `[${ts}] ${msg}`;
  logHistory.push(entry);
  const el = $('log');
  if (!el) return;
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = entry;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// ── State machine ──
function switchState(state) {
  $('setupView').classList.remove('active');
  $('recordingView').classList.remove('active');
  $('doneView').classList.remove('active');
  if (state === 'setup') $('setupView').classList.add('active');
  else if (state === 'recording') {
    $('recordingView').classList.add('active');
    $('recHeader').style.display = '';
    $('doneBar').style.display = 'none';
  } else if (state === 'done') {
    // Keep recording view visible (timeline stays), replace header with done bar
    $('recordingView').classList.add('active');
    $('recHeader').style.display = 'none';
    $('doneBar').style.display = '';
  }
}

function newSession() {
  cleanup();
  switchState('setup');
  initMicPreview();
}

// ── Mic level meter ──
function initMicPreview() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    window._previewMicStream = stream;
    micStreamRef = stream;
    $('micDot').className = 'check-dot green';
    startMicMeter(stream);
  }).catch(err => {
    log('Mic access denied: ' + err.message, 'error');
    $('micDot').className = 'check-dot red';
  });
}

function startMicMeter(stream) {
  if (micAudioCtx) micAudioCtx.close().catch(() => {});
  micAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  micAnalyser = micAudioCtx.createAnalyser();
  micAnalyser.fftSize = 64;
  const source = micAudioCtx.createMediaStreamSource(stream);
  source.connect(micAnalyser);

  const dataArray = new Uint8Array(micAnalyser.frequencyBinCount);

  function animate() {
    micMeterRafId = requestAnimationFrame(animate);
    micAnalyser.getByteFrequencyData(dataArray);

    // Update large bars (setup)
    const setupBars = $('micBarsSetup');
    if (setupBars) {
      const bars = setupBars.querySelectorAll('.mic-bar');
      const binCount = bars.length;
      for (let i = 0; i < binCount; i++) {
        const binIndex = Math.floor(i * dataArray.length / binCount);
        const val = dataArray[binIndex] || 0;
        const h = Math.max(3, Math.round(val / 255 * 14));
        bars[i].style.height = h + 'px';
        bars[i].className = 'mic-bar' + (val > 20 ? ' active' : '');
      }
    }

    // Update mini bars (recording)
    const recBars = $('micBarsRec');
    if (recBars) {
      const bars = recBars.querySelectorAll('.mic-bar');
      const binCount = bars.length;
      for (let i = 0; i < binCount; i++) {
        const binIndex = Math.floor(i * dataArray.length / binCount);
        const val = dataArray[binIndex] || 0;
        const h = Math.max(2, Math.round(val / 255 * 10));
        bars[i].style.height = h + 'px';
        bars[i].className = 'mic-bar' + (val > 20 ? ' active' : '');
      }
    }
  }
  animate();
}

function stopMicMeter() {
  if (micMeterRafId) cancelAnimationFrame(micMeterRafId);
  micMeterRafId = null;
  if (micAudioCtx) micAudioCtx.close().catch(() => {});
  micAudioCtx = null;
  micAnalyser = null;
}

// ── Timeline ──
function insertTimelineEntry(type, timestamp, label, imgSrc) {
  const feed = $('timelineFeed');
  if (!feed) return;

  const entry = document.createElement('div');
  entry.className = 'tl-entry';
  entry.dataset.timestamp = timestamp;

  const time = document.createElement('span');
  time.className = 'tl-time';
  time.textContent = formatTime(timestamp);
  entry.appendChild(time);

  const badge = document.createElement('span');
  badge.className = 'tl-badge ' + (type === 'img' ? 'img' : 'stt');
  badge.textContent = type === 'img' ? 'IMG' : 'STT';
  entry.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'tl-body';

  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    body.appendChild(img);
  }
  if (label) {
    const text = document.createElement('span');
    text.className = 'tl-text';
    text.textContent = label;
    body.appendChild(text);
  }

  entry.appendChild(body);

  // Insert in sorted order by timestamp
  const existing = feed.querySelectorAll('.tl-entry');
  let inserted = false;
  for (let i = existing.length - 1; i >= 0; i--) {
    if (parseFloat(existing[i].dataset.timestamp) <= timestamp) {
      existing[i].after(entry);
      inserted = true;
      break;
    }
  }
  if (!inserted) feed.prepend(entry);

  // Auto-scroll if near bottom
  const isNearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100;
  if (isNearBottom) feed.scrollTop = feed.scrollHeight;
}

function insertSTTPlaceholder(chunkNum, offsetTime) {
  const feed = $('timelineFeed');
  if (!feed) return;

  const entry = document.createElement('div');
  entry.className = 'tl-entry pending';
  entry.dataset.timestamp = offsetTime;
  entry.dataset.chunkNum = chunkNum;

  const time = document.createElement('span');
  time.className = 'tl-time';
  time.textContent = formatTime(offsetTime);
  entry.appendChild(time);

  const badge = document.createElement('span');
  badge.className = 'tl-badge stt';
  badge.textContent = 'STT';
  entry.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'tl-body';
  const text = document.createElement('span');
  text.className = 'tl-text';
  text.textContent = 'transcribing...';
  body.appendChild(text);
  entry.appendChild(body);

  // Insert in sorted order
  const existing = feed.querySelectorAll('.tl-entry');
  let inserted = false;
  for (let i = existing.length - 1; i >= 0; i--) {
    if (parseFloat(existing[i].dataset.timestamp) <= offsetTime) {
      existing[i].after(entry);
      inserted = true;
      break;
    }
  }
  if (!inserted) feed.prepend(entry);

  const isNearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100;
  if (isNearBottom) feed.scrollTop = feed.scrollHeight;
}

function replaceSTTPlaceholder(chunkNum, transcriptText, offsetTime) {
  const feed = $('timelineFeed');
  if (!feed) return;

  const placeholder = feed.querySelector(`.tl-entry[data-chunk-num="${chunkNum}"]`);
  if (placeholder) {
    placeholder.classList.remove('pending');
    const textEl = placeholder.querySelector('.tl-text');
    if (textEl) textEl.textContent = transcriptText || '(no speech detected)';
  } else {
    // No placeholder found, insert directly
    insertTimelineEntry('stt', offsetTime, transcriptText || '(no speech detected)', null);
  }
}

// ── Status strip ──
function updateStatusStrip() {
  // STT
  const sttPill = $('stripStt');
  if (sttPill) {
    if (whisperLocal) {
      sttPill.textContent = 'STT local';
      sttPill.parentElement.className = 'status-pill green';
    } else if ($('apiKey') && $('apiKey').value.trim()) {
      sttPill.textContent = 'STT cloud';
      sttPill.parentElement.className = 'status-pill blue';
    } else {
      sttPill.textContent = 'STT off';
      sttPill.parentElement.className = 'status-pill red';
    }
  }

  // Mic
  const micPill = $('stripMic');
  if (micPill) {
    const active = micStreamRef && micStreamRef.active;
    micPill.textContent = active ? 'Mic' : 'Mic off';
    micPill.parentElement.className = 'status-pill ' + (active ? 'green' : 'red');
  }

  // Capture resolution
  const capPill = $('stripCapture');
  if (capPill && screenStream) {
    const track = screenStream.getVideoTracks()[0];
    if (track && track.getSettings) {
      const s = track.getSettings();
      capPill.textContent = `Capture ${s.width || '--'}x${s.height || '--'}`;
    }
  }

  // Counts
  const imgCount = $('stripImgCount');
  if (imgCount) imgCount.textContent = screenshots.length + ' img';

  const sttCount = $('stripSttCount');
  if (sttCount) sttCount.textContent = `${transcribedCount}/${chunkCount} stt`;

  const dedupEl = $('stripDedup');
  if (dedupEl) dedupEl.textContent = dedupCount + ' deduped';

  // Header counts
  const hImg = $('headerImgCount');
  if (hImg) hImg.textContent = screenshots.length + ' img';
  const hStt = $('headerSttCount');
  if (hStt) hStt.textContent = `${transcribedCount}/${chunkCount} stt`;

  // Diag summary
  const diagSum = $('diagSummary');
  if (diagSum) {
    const video = $('captureVideo');
    const w = video ? video.videoWidth : '--';
    const h = video ? video.videoHeight : '--';
    diagSum.textContent = `VideoFrame ${w}x${h} | Mic ${micStreamRef?.active ? 'active' : 'dead'} | Chunk ${chunkCount} | Dedup: ${dedupCount} skipped | Black: OK`;
  }
}

// ── Clipboard copy ──
function copyPath() {
  const text = savedPath || '';
  if (!text) return;
  function showCopied() {
    for (const id of ['copyBtn', 'copyBtn2']) {
      const btn = $(id);
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'copy'; }, 2000); }
    }
  }
  navigator.clipboard.writeText(text).then(showCopied).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied();
  });
}

// ── Frame capture — tries multiple methods with timeout ──
async function captureFrame() {
  const track = screenStream.getVideoTracks()[0];

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error(`timeout after ${ms}ms`)), ms))
    ]);
  }

  // Method 1: MediaStreamTrackProcessor + VideoFrame (Chrome 94+)
  if (typeof MediaStreamTrackProcessor !== 'undefined') {
    try {
      log('Trying VideoFrame capture...', 'info');
      const processor = new MediaStreamTrackProcessor({ track });
      const reader = processor.readable.getReader();
      const { value: frame } = await withTimeout(reader.read(), 3000);
      const canvas = document.createElement('canvas');
      canvas.width = frame.displayWidth;
      canvas.height = frame.displayHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(frame, 0, 0);
      frame.close();
      reader.cancel();
      log(`Frame via VideoFrame: ${canvas.width}x${canvas.height}`, 'info');
      return { canvas, ctx };
    } catch (e) {
      log(`VideoFrame failed: ${e.message}`, 'error');
    }
  }

  // Method 2: ImageCapture.grabFrame() (Chrome 59+)
  if (typeof ImageCapture !== 'undefined') {
    try {
      log('Trying ImageCapture...', 'info');
      const capture = new ImageCapture(track);
      const bitmap = await withTimeout(capture.grabFrame(), 3000);
      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
      log(`Frame via ImageCapture: ${canvas.width}x${canvas.height}`, 'info');
      return { canvas, ctx };
    } catch (e) {
      log(`ImageCapture failed: ${e.message}`, 'error');
    }
  }

  // Method 3: Fallback to video element drawImage (may be black on some systems)
  log('Trying drawImage fallback...', 'info');
  const video = $('captureVideo');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  log(`Frame via drawImage: ${canvas.width}x${canvas.height}`, 'info');
  return { canvas, ctx };
}

// ── Screenshot capture ──
async function captureScreenshot(clickPoint, boundingBox) {
  if (!screenStream || !isRecording) return;

  const track = screenStream.getVideoTracks()[0];
  if (!track || track.readyState !== 'live') {
    log('Screenshot skipped: video track not live', 'error');
    return;
  }

  if (captureInProgress) {
    log('Screenshot skipped: capture already in progress', 'info');
    return;
  }
  captureInProgress = true;

  try {
  const { canvas, ctx } = await captureFrame();
  const w = canvas.width;
  const h = canvas.height;

  if (w === 0 || h === 0) {
    log(`Screenshot skipped: frame dimensions ${w}x${h}`, 'error');
    return;
  }

  // Skip near-duplicate frames (auto-captures only, not manual clicks)
  // But always save at least one frame every 5 seconds
  const nowSec = (Date.now() - sessionStartTime) / 1000;
  const lastShotTime = screenshots.length > 0 ? screenshots[screenshots.length - 1].timestamp : -999;
  const forceCapture = (nowSec - lastShotTime) >= 5;

  if (!clickPoint && !boundingBox && lastFrameData && !forceCapture) {
    // Sample a wide horizontal strip from the middle of the frame (catches scrolling, cursor, content changes)
    const stripY = Math.floor(h / 2) - 4;
    const stripH = 8;
    const check = ctx.getImageData(0, Math.max(0, stripY), w, stripH);
    const prev = lastFrameData;
    if (prev && prev.length === check.data.length) {
      let totalDiff = 0;
      let samples = 0;
      // Sample every 64th pixel across the full width
      for (let i = 0; i < check.data.length; i += 256) {
        totalDiff += Math.abs(check.data[i] - prev[i]);
        samples++;
      }
      if (samples > 0 && totalDiff / samples < 3) {
        dedupCount++;
        captureInProgress = false;
        return;
      }
    }
  }

  // Always detect black frames
  const sample = ctx.getImageData(
    Math.floor(w / 4), Math.floor(h / 4),
    Math.min(32, w), Math.min(32, h)
  );
  const nonBlack = sample.data.some((v, i) => i % 4 !== 3 && v > 5);
  if (!nonBlack) {
    log(`WARNING: screenshot #${screenshots.length + 1} is a BLACK FRAME (${w}x${h})`, 'error');
  }

  // Store frame strip for dedup comparison (full-width horizontal strip from middle)
  const stripY = Math.floor(h / 2) - 4;
  lastFrameData = ctx.getImageData(0, Math.max(0, stripY), w, 8).data;

  // Draw marker annotation
  let marker = null;
  if (clickPoint) {
    marker = screenshots.length + 1;
    drawMarker(ctx, clickPoint.x, clickPoint.y, marker, canvas.width);
  } else if (boundingBox) {
    marker = screenshots.length + 1;
    drawSelectionBox(ctx, boundingBox, marker, canvas.width);
  }

  const dataUrl = canvas.toDataURL('image/png');
  const elapsed = (Date.now() - sessionStartTime) / 1000;
  const shot = { timestamp: elapsed, dataUrl };
  if (clickPoint) shot.clickPoint = { x: clickPoint.x, y: clickPoint.y, marker };
  if (boundingBox) shot.boundingBox = { ...boundingBox, marker };
  screenshots.push(shot);

  // Update timeline and status
  insertTimelineEntry('img', elapsed, null, dataUrl);
  updateStatusStrip();

  log(`Screenshot #${screenshots.length} at ${formatTime(elapsed)}`);
  } finally {
    captureInProgress = false;
  }
}

// ── Draw numbered circle marker ──
function drawMarker(ctx, x, y, number, imageWidth) {
  const radius = Math.round(imageWidth * 0.015);
  const fontSize = Math.round(radius * 1.3);

  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 38, 38, 0.9)';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = Math.max(2, radius * 0.15);
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(number), x, y);
}

// ── Draw selection rectangle ──
function drawSelectionBox(ctx, box, number, imageWidth) {
  const { x1, y1, x2, y2 } = box;
  const w = x2 - x1;
  const h = y2 - y1;

  ctx.fillStyle = 'rgba(220, 38, 38, 0.15)';
  ctx.fillRect(x1, y1, w, h);

  ctx.strokeStyle = 'rgba(220, 38, 38, 0.8)';
  ctx.lineWidth = Math.max(2, imageWidth * 0.002);
  ctx.strokeRect(x1, y1, w, h);

  drawMarker(ctx, x1, y1, number, imageWidth);
}

// ── Chunked audio transcription ──
function startChunkRecording(stream) {
  const mimeType = getSupportedMimeType();
  log(`Audio recording: ${mimeType}, tracks: ${stream.getAudioTracks().length}, active: ${stream.active}`, 'info');
  chunkAudioParts = [];
  chunkStartTime = (Date.now() - sessionStartTime) / 1000;

  chunkRecorder = new MediaRecorder(stream, { mimeType });
  chunkRecorder.ondataavailable = e => {
    if (e.data.size > 0) chunkAudioParts.push(e.data);
  };
  chunkRecorder.onerror = (e) => {
    log(`Audio recorder error: ${e.error?.name || 'unknown'}`, 'error');
  };
  // No timeslice — stop() triggers single ondataavailable with complete file
  chunkRecorder.start();
}

function rotateChunk() {
  if (!chunkRecorder || chunkRecorder.state !== 'recording') return;

  const partsSnapshot = chunkAudioParts;
  const startSnapshot = chunkStartTime;
  chunkCount++;
  const chunkNum = chunkCount;

  // Insert STT placeholder in timeline
  insertSTTPlaceholder(chunkNum, startSnapshot);

  // Stop current recorder — triggers finalization
  chunkRecorder.stop();
  const finalizePromise = new Promise(resolve => {
    chunkRecorder.onstop = () => {
      const mimeType = getSupportedMimeType();
      const ext = mimeType.includes('webm') ? 'webm' : mimeType.includes('mp4') ? 'mp4' : 'ogg';
      const blob = new Blob(partsSnapshot, { type: mimeType });

      if (blob.size < 1000) {
        log(`Chunk ${chunkNum} too small (${blob.size}B), skipping`, 'info');
        resolve();
        return;
      }

      const transcriptionPromise = transcribeChunk(blob, ext, startSnapshot, chunkNum);
      pendingTranscriptions.push(transcriptionPromise);
      transcriptionPromise.then(resolve);
    };
  });

  // Start new chunk immediately
  if (isRecording && micStreamRef) {
    startChunkRecording(micStreamRef);
  }

  return finalizePromise;
}

async function transcribeChunk(audioBlob, ext, offsetTime, chunkNum) {
  const isLocal = whisperLocal;
  const baseUrl = isLocal ? WHISPER_LOCAL_URL : WHISPER_CLOUD_URL;
  const apiKey = $('apiKey') ? $('apiKey').value.trim() : '';

  if (!isLocal && !apiKey) {
    log(`Chunk ${chunkNum}: no STT available, skipping`, 'error');
    transcriptSegments.push({
      start: offsetTime,
      end: offsetTime + CHUNK_DURATION / 1000,
      text: '(No transcription available)'
    });
    replaceSTTPlaceholder(chunkNum, '(No transcription available)', offsetTime);
    updateStatusStrip();
    return;
  }

  const headers = {};
  if (!isLocal) headers['Authorization'] = `Bearer ${apiKey}`;

  // Build context prompt from recent transcript for continuity
  const recentText = transcriptSegments.slice(-5).map(s => s.text).join(' ').trim();
  const prompt = recentText
    ? `Feedback session on a web application. Previous: ${recentText.slice(-150)}`
    : 'Feedback session on a web application. User is describing what they see on screen.';

  const formData = new FormData();
  formData.append('file', audioBlob, `chunk.${ext}`);
  formData.append('model', 'whisper-1');
  formData.append('response_format', 'verbose_json');
  formData.append('timestamp_granularities[]', 'segment');
  formData.append('temperature', '0');
  formData.append('prompt', prompt);

  // Local whisper: use /transcribe proxy (converts WebM→WAV via ffmpeg)
  // Cloud (OpenAI): hit API directly (accepts WebM natively)
  const transcribeUrl = isLocal ? '/transcribe' : `${baseUrl}/v1/audio/transcriptions`;

  try {
    const resp = await fetch(transcribeUrl, {
      method: 'POST',
      headers,
      body: formData
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`${resp.status}: ${errText.slice(0, 200)}`);
    }

    const data = await resp.json();
    const segments = data.segments || [{ start: 0, end: data.duration || 0, text: data.text || '' }];

    // Offset timestamps by chunk start time
    for (const seg of segments) {
      transcriptSegments.push({
        start: seg.start + offsetTime,
        end: seg.end + offsetTime,
        text: seg.text
      });
    }

    transcribedCount++;
    const transcriptText = segments.map(s => s.text).join(' ').trim();
    replaceSTTPlaceholder(chunkNum, transcriptText, offsetTime);
    updateStatusStrip();
    log(`Chunk ${chunkNum} transcribed (${segments.length} segments)`, 'success');
  } catch (err) {
    log(`Chunk ${chunkNum} failed: ${err.message}`, 'error');
    transcriptSegments.push({
      start: offsetTime,
      end: offsetTime + CHUNK_DURATION / 1000,
      text: `(Chunk ${chunkNum} transcription failed)`
    });
    transcribedCount++;
    replaceSTTPlaceholder(chunkNum, `(Chunk ${chunkNum} transcription failed)`, offsetTime);
    updateStatusStrip();
  }
}

// ── Start session ──
async function startSession() {
  try {
    log('Requesting screen share...', 'info');
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: false
    });

    // Reuse preview mic stream if active, otherwise request new one
    if (window._previewMicStream && window._previewMicStream.active) {
      micStreamRef = window._previewMicStream;
      log('Reusing preview mic stream', 'info');
    } else {
      log('Requesting microphone...', 'info');
      micStreamRef = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    // Set up hidden video for drawImage fallback
    const video = $('captureVideo');
    video.srcObject = screenStream;

    // Reset state
    screenshots = [];
    transcriptSegments = [];
    pendingTranscriptions = [];
    chunkCount = 0;
    transcribedCount = 0;
    sessionStartTime = Date.now();
    isRecording = true;
    zipBlob = null;
    lastFrameData = null;
    dedupCount = 0;

    // Clear timeline
    const feed = $('timelineFeed');
    if (feed) feed.textContent = '';

    // Switch to recording view
    switchState('recording');

    // Start mic meter for recording view
    startMicMeter(micStreamRef);

    // Start status strip updates
    statusStripIntervalId = setInterval(updateStatusStrip, 1000);
    updateStatusStrip();

    // Start chunked audio recording
    startChunkRecording(micStreamRef);

    // Rotate audio chunks every 10 seconds
    chunkRotationId = setInterval(rotateChunk, CHUNK_DURATION);

    // Auto-capture screenshots every second
    screenshotIntervalId = setInterval(() => {
      captureScreenshot().catch(e => log(`Auto-capture failed: ${e.message}`, 'error'));
    }, CAPTURE_INTERVAL);

    // Start duration timer
    durationIntervalId = setInterval(() => {
      const elapsed = (Date.now() - sessionStartTime) / 1000;
      const el = $('recTime');
      if (el) el.textContent = formatTime(elapsed);
    }, 500);

    // Take initial screenshot once video is ready
    const onVideoReady = async () => {
      video.removeEventListener('loadedmetadata', onVideoReady);
      log(`Video ready: ${video.videoWidth}x${video.videoHeight}`, 'info');
      // Wait a beat for the stream to deliver its first frame
      await new Promise(r => setTimeout(r, 500));
      try {
        await captureScreenshot();
      } catch (e) {
        log(`Initial screenshot failed: ${e.message}`, 'error');
      }
    };
    if (video.videoWidth > 0 && video.videoHeight > 0) {
      onVideoReady();
    } else {
      video.addEventListener('loadedmetadata', onVideoReady);
    }

    // Handle screen share ending
    screenStream.getVideoTracks()[0].onended = () => {
      if (isRecording) stopSession();
    };

    log('Session started', 'success');

  } catch (err) {
    log(`Error: ${err.message}`, 'error');
    cleanup();
  }
}

// ── Stop session ──
async function stopSession() {
  if (!isRecording) return;

  // Take final screenshot BEFORE clearing the recording flag
  await captureScreenshot();

  isRecording = false;

  // Stop chunk rotation
  clearInterval(chunkRotationId);
  clearInterval(durationIntervalId);
  clearInterval(screenshotIntervalId);
  clearInterval(statusStripIntervalId);

  // Finalize the last chunk
  if (chunkRecorder && chunkRecorder.state === 'recording') {
    const partsSnapshot = chunkAudioParts;
    const startSnapshot = chunkStartTime;
    chunkCount++;
    const chunkNum = chunkCount;

    // Insert placeholder for final chunk
    insertSTTPlaceholder(chunkNum, startSnapshot);

    chunkRecorder.stop();
    await new Promise(resolve => {
      chunkRecorder.onstop = () => {
        const mimeType = getSupportedMimeType();
        const ext = mimeType.includes('webm') ? 'webm' : mimeType.includes('mp4') ? 'mp4' : 'ogg';
        const blob = new Blob(partsSnapshot, { type: mimeType });

        if (blob.size >= 1000) {
          const p = transcribeChunk(blob, ext, startSnapshot, chunkNum);
          pendingTranscriptions.push(p);
          p.then(resolve);
        } else {
          resolve();
        }
      };
    });
  }

  // Stop streams
  screenStream.getTracks().forEach(t => t.stop());
  // Don't stop mic — we might reuse it

  log(`Session stopped. ${screenshots.length} screenshots, ${chunkCount} audio chunks.`);

  // Wait for all pending transcriptions
  await Promise.allSettled(pendingTranscriptions);
  log(`All ${transcribedCount} chunks transcribed.`, 'success');

  // Sort segments by start time (chunks may complete out of order)
  transcriptSegments.sort((a, b) => a.start - b.start);

  // Build output (no audio in ZIP)
  const markdown = buildMarkdown(transcriptSegments);
  zipBlob = await buildZip(markdown);

  // Auto-save to server
  savedPath = (await saveToServer(markdown)) || '';

  // Calculate duration
  const duration = (Date.now() - sessionStartTime) / 1000;

  // Populate done bar (replaces recording header, timeline stays)
  const doneBarSummary = $('doneBarSummary');
  if (doneBarSummary) doneBarSummary.textContent = `${screenshots.length} img, ${transcribedCount} stt, ${formatTime(duration)}`;

  const doneBarPath = $('doneBarPath');
  if (doneBarPath) doneBarPath.textContent = savedPath || 'ZIP ready';

  // Also populate the standalone done view elements (for backward compat)
  const summary = $('doneSummary');
  if (summary) summary.textContent = `${screenshots.length} screenshots, ${transcribedCount} transcript chunks, ${formatTime(duration)} duration`;
  const pathText = $('donePathText');
  if (pathText) pathText.textContent = savedPath || 'ZIP ready for download';

  if (savedPath) {
    log(`Session saved to: ${savedPath}`, 'success');
  } else {
    log('ZIP ready for download (server save failed)', 'success');
  }

  switchState('done');

  // Show retroactive ticket prompt if no ticket was set
  if (!($('ticketId') && $('ticketId').value.trim())) {
    const retro = $('retroTicket');
    if (retro) { retro.style.display = 'flex'; }
    const retroInput = $('retroTicketId');
    if (retroInput) retroInput.focus();
  }
}

// ── Build markdown ──
function buildMarkdown(segments) {
  const date = new Date(sessionStartTime).toISOString().slice(0, 16).replace('T', ' ');
  const ticketId = $('ticketId') ? $('ticketId').value.trim() : '';
  let md = `# Feedback Session — ${date}\n`;
  if (ticketId) md += `Ticket: ${ticketId}\n`;
  md += '\n';

  if (screenshots.length === 0) {
    md += '> No screenshots captured.\n\n';
    for (const seg of segments) {
      md += `## ${formatTime(seg.start)} - ${formatTime(seg.end)}\n\n`;
      md += `> ${seg.text.trim()}\n\n`;
    }
    return md;
  }

  for (let i = 0; i < screenshots.length; i++) {
    const shot = screenshots[i];
    const nextShot = screenshots[i + 1];
    const startT = shot.timestamp;
    const endT = nextShot ? nextShot.timestamp : Infinity;

    md += `## ${formatTime(startT)}`;
    if (nextShot) md += ` - ${formatTime(endT)}`;
    md += `\n\n`;

    md += `![Screenshot ${i + 1}](./images/${String(i + 1).padStart(3, '0')}.png)\n\n`;

    // Marker annotation
    if (shot.clickPoint) {
      md += `**[Marker ${shot.clickPoint.marker} — user clicked at (${shot.clickPoint.x}, ${shot.clickPoint.y})]**\n\n`;
    } else if (shot.boundingBox) {
      md += `**[Marker ${shot.boundingBox.marker} — user selected region (${shot.boundingBox.x1},${shot.boundingBox.y1})→(${shot.boundingBox.x2},${shot.boundingBox.y2})]**\n\n`;
    }

    // Find overlapping transcript segments
    const overlapping = segments.filter(seg =>
      seg.start < endT && seg.end > startT
    );

    if (overlapping.length > 0) {
      for (const seg of overlapping) {
        md += `> ${seg.text.trim()}\n\n`;
      }
    }
  }

  return md;
}

// ── Build ZIP (no audio) ──
async function buildZip(markdown) {
  const zip = new JSZip();
  zip.file('session.md', markdown);

  const imgFolder = zip.folder('images');
  for (let i = 0; i < screenshots.length; i++) {
    const dataUrl = screenshots[i].dataUrl;
    const base64 = dataUrl.split(',')[1];
    imgFolder.file(`${String(i + 1).padStart(3, '0')}.png`, base64, { base64: true });
  }

  // Build session player
  const ticketId = $('ticketId') ? $('ticketId').value.trim() : '';
  const sessionData = {
    date: new Date(sessionStartTime).toISOString(),
    ticketId: ticketId || null,
    slides: screenshots.map((shot, i) => {
      const nextShot = screenshots[i + 1];
      const startT = shot.timestamp;
      const endT = nextShot ? nextShot.timestamp : startT + 5;
      const transcript = transcriptSegments
        .filter(seg => seg.start < endT && seg.end > startT)
        .map(seg => seg.text.trim())
        .join(' ');
      return {
        image: shot.dataUrl,
        timestamp: startT,
        duration: endT - startT,
        marker: shot.clickPoint || shot.boundingBox || null,
        transcript
      };
    })
  };
  // Validate player data
  const firstImgLen = sessionData.slides[0]?.image?.length || 0;
  log(`Player data: ${sessionData.slides.length} slides, first image: ${(firstImgLen/1024).toFixed(0)}KB`);

  zip.file('player.html', buildPlayerHtml(sessionData));

  log('Building ZIP...');
  const blob = await zip.generateAsync({ type: 'blob' });
  log(`ZIP size: ${(blob.size / 1024 / 1024).toFixed(2)} MB`);
  return blob;
}

// ── Save session to server filesystem ──
async function saveToServer(markdown) {
  try {
    const ts = new Date(sessionStartTime).toISOString().slice(0, 19).replace(/[T:]/g, '-');
    const ticketId = $('ticketId') ? $('ticketId').value.trim() : '';
    const name = ticketId ? `feedbacks-${ticketId}-${ts}` : `feedbacks-${ts}`;

    // Build player HTML for saving
    const sessionData = {
      date: new Date(sessionStartTime).toISOString(),
      ticketId: ticketId || null,
      slides: screenshots.map((shot, i) => {
        const nextShot = screenshots[i + 1];
        const startT = shot.timestamp;
        const endT = nextShot ? nextShot.timestamp : startT + 5;
        const transcript = transcriptSegments
          .filter(seg => seg.start < endT && seg.end > startT)
          .map(seg => seg.text.trim())
          .join(' ');
        return {
          image: shot.dataUrl,
          timestamp: startT,
          duration: endT - startT,
          marker: shot.clickPoint || shot.boundingBox || null,
          transcript
        };
      })
    };

    const payload = {
      name,
      markdown,
      player: buildPlayerHtml(sessionData),
      images: screenshots.map((shot, i) => ({
        filename: `${String(i + 1).padStart(3, '0')}.png`,
        base64: shot.dataUrl.split(',')[1]
      })),
      log: logHistory.join('\n')
    };

    log('Saving to server...');
    const resp = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await resp.json();
    if (result.ok) {
      return result.path;
    } else {
      log(`Server save failed: ${result.error}`, 'error');
      return null;
    }
  } catch (err) {
    log(`Server save unavailable: ${err.message}`, 'error');
    return null;
  }
}

// ── Build self-contained player HTML ──
function buildPlayerHtml(data) {
  const jsonStr = JSON.stringify(data);
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedbacks Player — ${data.date.slice(0, 10)}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem}
h1{font-size:1.3rem;font-weight:600;color:#fff;margin-bottom:0.2rem}
.meta{font-size:0.8rem;color:#666;margin-bottom:1rem}
.stage{width:100%;max-width:960px;background:#111;border:1px solid #333;border-radius:10px;overflow:hidden;margin-bottom:0.75rem;position:relative}
.stage img{width:100%;display:block}
.transcript-box{width:100%;max-width:960px;min-height:60px;background:#111;border:1px solid #272727;border-radius:8px;padding:0.75rem 1rem;margin-bottom:0.75rem;font-size:0.95rem;line-height:1.6;color:#ccc}
.transcript-box.fade{animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.marker-info{font-size:0.75rem;color:#888;margin-bottom:0.75rem;height:1.2em}
.controls{display:flex;gap:0.6rem;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;justify-content:center}
button{background:#222;color:#e0e0e0;border:1px solid #444;border-radius:6px;padding:0.4rem 0.9rem;font-size:0.85rem;cursor:pointer;transition:background 0.15s}
button:hover{background:#333;border-color:#666}
button.active{background:#1a6b3c;border-color:#2a8b4c;color:#fff}
select{background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:0.35rem 0.5rem;font-size:0.8rem}
.info{font-size:0.8rem;color:#888;min-width:80px;text-align:center}
.timeline{width:100%;max-width:960px;height:32px;background:#1a1a1a;border:1px solid #333;border-radius:6px;position:relative;cursor:pointer;margin-bottom:0.5rem;overflow:hidden}
.timeline-fill{height:100%;background:#1a3c6b;border-radius:5px;transition:width 0.15s}
.timeline-markers{position:absolute;top:0;left:0;right:0;bottom:0}
.timeline-tick{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.15)}
.timeline-tick.current{background:#4ade80;width:3px}
</style>
</head>
<body>
<h1>Feedbacks Player</h1>
<p class="meta">${data.date.slice(0, 16).replace('T', ' ')}${data.ticketId ? ' · Ticket: ' + data.ticketId : ''}</p>
<div class="stage"><img id="slide" src="" alt="Screenshot"></div>
<div class="marker-info" id="markerInfo"></div>
<div class="transcript-box" id="transcript">Press play or use arrow keys</div>
<div class="timeline" id="timeline" onclick="onTimelineClick(event)">
  <div class="timeline-fill" id="timelineFill"></div>
  <div class="timeline-markers" id="timelineMarkers"></div>
</div>
<div class="controls">
  <button onclick="prev()" title="Previous (Left arrow)">&#9664; Prev</button>
  <button id="playBtn" onclick="togglePlay()" title="Play/Pause (Space)">&#9654; Play</button>
  <button onclick="next()" title="Next (Right arrow)">Next &#9654;</button>
  <span class="info" id="counter">1 / ${data.slides.length}</span>
  <span class="info" id="timestamp">0:00</span>
  <label style="font-size:0.8rem;color:#888">Speed:</label>
  <select id="speed" onchange="onSpeedChange()">
    <option value="0.5">0.5x</option>
    <option value="1" selected>1x</option>
    <option value="2">2x</option>
    <option value="4">4x</option>
  </select>
</div>
<script>
const SESSION = ${jsonStr};
const slides = SESSION.slides;
let current = 0;
let playing = false;
let timer = null;
let speed = 1;

const $=id=>document.getElementById(id);

// Build timeline ticks
const totalDuration = slides.length > 0 ? slides[slides.length-1].timestamp + slides[slides.length-1].duration : 1;
const markersEl = $('timelineMarkers');
slides.forEach((s,i) => {
  const tick = document.createElement('div');
  tick.className = 'timeline-tick';
  tick.dataset.index = i;
  tick.style.left = (s.timestamp / totalDuration * 100) + '%';
  markersEl.appendChild(tick);
});

function show(index) {
  if (index < 0 || index >= slides.length) return;
  current = index;
  const s = slides[current];
  $('slide').src = s.image;
  $('counter').textContent = (current+1) + ' / ' + slides.length;
  $('timestamp').textContent = fmtTime(s.timestamp);

  const tb = $('transcript');
  tb.textContent = s.transcript || '(no transcript)';
  tb.classList.remove('fade');
  void tb.offsetWidth;
  tb.classList.add('fade');

  if (s.marker) {
    if (s.marker.marker && s.marker.x !== undefined) {
      $('markerInfo').textContent = 'Marker ' + s.marker.marker + ' — clicked at (' + s.marker.x + ', ' + s.marker.y + ')';
    } else if (s.marker.marker && s.marker.x1 !== undefined) {
      $('markerInfo').textContent = 'Marker ' + s.marker.marker + ' — selected region (' + s.marker.x1 + ',' + s.marker.y1 + ')→(' + s.marker.x2 + ',' + s.marker.y2 + ')';
    } else {
      $('markerInfo').textContent = '';
    }
  } else {
    $('markerInfo').textContent = '';
  }

  // Update timeline
  $('timelineFill').style.width = (s.timestamp / totalDuration * 100) + '%';
  markersEl.querySelectorAll('.timeline-tick').forEach((t,i) => {
    t.classList.toggle('current', i === current);
  });
}

function togglePlay() {
  if (playing) pause(); else play();
}

function play() {
  playing = true;
  $('playBtn').innerHTML = '&#10074;&#10074; Pause';
  $('playBtn').classList.add('active');
  scheduleNext();
}

function pause() {
  playing = false;
  clearTimeout(timer);
  $('playBtn').innerHTML = '&#9654; Play';
  $('playBtn').classList.remove('active');
}

function scheduleNext() {
  if (!playing) return;
  if (current >= slides.length - 1) { pause(); return; }
  const dur = slides[current].duration * 1000 / speed;
  timer = setTimeout(() => { next(); scheduleNext(); }, dur);
}

function next() {
  if (current < slides.length - 1) { show(current + 1); if (playing) { clearTimeout(timer); scheduleNext(); } }
}

function prev() {
  if (current > 0) { show(current - 1); if (playing) { clearTimeout(timer); scheduleNext(); } }
}

function onTimelineClick(e) {
  const rect = $('timeline').getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const targetTime = pct * totalDuration;
  let closest = 0;
  for (let i = 0; i < slides.length; i++) {
    if (Math.abs(slides[i].timestamp - targetTime) < Math.abs(slides[closest].timestamp - targetTime)) closest = i;
  }
  show(closest);
  if (playing) { clearTimeout(timer); scheduleNext(); }
}

function onSpeedChange() {
  speed = parseFloat($('speed').value);
  if (playing) { clearTimeout(timer); scheduleNext(); }
}

function fmtTime(s) {
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); next(); }
  if (e.code === 'ArrowLeft') { e.preventDefault(); prev(); }
});

show(0);
<\/script>
</body>
</html>`;
}

// ── Download ──
function downloadZip() {
  if (!zipBlob) return;
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
  const ticketId = $('ticketId') ? $('ticketId').value.trim() : '';
  const prefix = ticketId ? `feedbacks-${ticketId}-` : 'feedbacks-';
  a.href = url;
  a.download = `${prefix}${ts}.zip`;
  a.click();
  URL.revokeObjectURL(url);
  log('Download started');
}

// ── Helpers ──
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg;codecs=opus'];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return 'audio/webm';
}

function cleanup() {
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  if (micStreamRef) micStreamRef.getTracks().forEach(t => t.stop());
  clearInterval(durationIntervalId);
  clearInterval(chunkRotationId);
  clearInterval(screenshotIntervalId);
  clearInterval(statusStripIntervalId);
  stopMicMeter();
  isRecording = false;
}

// ── Init ──
checkWhisper();
whisperCheckId = setInterval(checkWhisper, 5000);
initMicPreview();
const savedApiKey = localStorage.getItem('feedbacks_api_key');
if (savedApiKey && $('apiKey')) $('apiKey').value = savedApiKey;
if ($('apiKey')) $('apiKey').addEventListener('change', () => {
  localStorage.setItem('feedbacks_api_key', $('apiKey').value);
});
// Ticket ID: query param > localStorage
const _urlTicket = new URLSearchParams(location.search).get('ticket');
if (_urlTicket && $('ticketId')) {
  $('ticketId').value = _urlTicket.trim().toUpperCase();
  $('ticketId').readOnly = true;
  showTicketBadge('From /review');
} else {
  const savedTicket = localStorage.getItem('feedbacks_ticket_id');
  if (savedTicket && $('ticketId')) { $('ticketId').value = savedTicket; showTicketBadge('Linked'); }
}
if ($('ticketId')) $('ticketId').addEventListener('change', function() {
  const val = this.value.trim().toUpperCase();
  this.value = val;
  if (val) { localStorage.setItem('feedbacks_ticket_id', val); showTicketBadge('Linked'); }
  else { localStorage.removeItem('feedbacks_ticket_id'); showTicketBadge(''); }
});

function showTicketBadge(text) {
  const id = $('ticketId') ? $('ticketId').value.trim() : '';
  const badge = $('ticketBadge');
  if (badge) { badge.textContent = text; badge.style.display = id ? '' : 'none'; }
  const clear = $('ticketClear');
  if (clear) { clear.style.display = id ? '' : 'none'; }
}
function clearTicketId() {
  if ($('ticketId')) { $('ticketId').value = ''; $('ticketId').readOnly = false; }
  localStorage.removeItem('feedbacks_ticket_id');
  showTicketBadge('');
}
// Retroactive ticket linking (after session ends without a ticket)
if ($('retroTicketId')) $('retroTicketId').addEventListener('change', function() {
  const val = this.value.trim().toUpperCase();
  if (val && $('ticketId')) {
    $('ticketId').value = val;
    localStorage.setItem('feedbacks_ticket_id', val);
    showTicketBadge('Linked');
    if ($('retroTicket')) $('retroTicket').style.display = 'none';
    log(`Ticket ${val} linked retroactively`);
  }
});
</script>
</body>
</html>
