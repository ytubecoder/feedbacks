// ── Frame capture — tries multiple methods with timeout ──
async function captureFrame() {
  const track = screenStream.getVideoTracks()[0];

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error(`timeout after ${ms}ms`)), ms))
    ]);
  }

  // Method 1: MediaStreamTrackProcessor + VideoFrame (Chrome 94+)
  if (typeof MediaStreamTrackProcessor !== 'undefined') {
    try {
      log('Trying VideoFrame capture...', 'info');
      const processor = new MediaStreamTrackProcessor({ track });
      const reader = processor.readable.getReader();
      const { value: frame } = await withTimeout(reader.read(), 3000);
      const canvas = document.createElement('canvas');
      canvas.width = frame.displayWidth;
      canvas.height = frame.displayHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(frame, 0, 0);
      frame.close();
      reader.cancel();
      log(`Frame via VideoFrame: ${canvas.width}x${canvas.height}`, 'info');
      return { canvas, ctx };
    } catch (e) {
      log(`VideoFrame failed: ${e.message}`, 'error');
    }
  }

  // Method 2: ImageCapture.grabFrame() (Chrome 59+)
  if (typeof ImageCapture !== 'undefined') {
    try {
      log('Trying ImageCapture...', 'info');
      const capture = new ImageCapture(track);
      const bitmap = await withTimeout(capture.grabFrame(), 3000);
      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
      log(`Frame via ImageCapture: ${canvas.width}x${canvas.height}`, 'info');
      return { canvas, ctx };
    } catch (e) {
      log(`ImageCapture failed: ${e.message}`, 'error');
    }
  }

  // Method 3: Fallback to video element drawImage (may be black on some systems)
  log('Trying drawImage fallback...', 'info');
  const video = $('captureVideo');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  log(`Frame via drawImage: ${canvas.width}x${canvas.height}`, 'info');
  return { canvas, ctx };
}

// ── Screenshot capture ──
async function captureScreenshot(session, clickPoint, boundingBox) {
  session = session || currentSession;
  if (!session || !session.isRecording) return;
  if (!screenStream) return;

  const track = screenStream.getVideoTracks()[0];
  if (!track || track.readyState !== 'live') {
    log('Screenshot skipped: video track not live', 'error');
    return;
  }

  if (captureInProgress) {
    log('Screenshot skipped: capture already in progress', 'info');
    return;
  }
  captureInProgress = true;

  try {
  const { canvas, ctx } = await captureFrame();
  const w = canvas.width;
  const h = canvas.height;

  if (w === 0 || h === 0) {
    log(`Screenshot skipped: frame dimensions ${w}x${h}`, 'error');
    return;
  }

  // Skip near-duplicate frames (auto-captures only, not manual clicks)
  // But always save at least one frame every 5 seconds
  const nowSec = (Date.now() - session.startTime) / 1000;
  const lastShotTime = session.screenshots.length > 0 ? session.screenshots[session.screenshots.length - 1].timestamp : -999;
  const forceCapture = (nowSec - lastShotTime) >= 5;

  if (!clickPoint && !boundingBox && session.lastFrameData && !forceCapture) {
    // Sample a wide horizontal strip from the middle of the frame (catches scrolling, cursor, content changes)
    const stripY = Math.floor(h / 2) - 4;
    const stripH = 8;
    const check = ctx.getImageData(0, Math.max(0, stripY), w, stripH);
    const prev = session.lastFrameData;
    if (prev && prev.length === check.data.length) {
      let totalDiff = 0;
      let samples = 0;
      // Sample every 64th pixel across the full width
      for (let i = 0; i < check.data.length; i += 256) {
        totalDiff += Math.abs(check.data[i] - prev[i]);
        samples++;
      }
      if (samples > 0 && totalDiff / samples < 3) {
        session.dedupCount++;
        captureInProgress = false;
        return;
      }
    }
  }

  // Always detect black frames
  const sample = ctx.getImageData(
    Math.floor(w / 4), Math.floor(h / 4),
    Math.min(32, w), Math.min(32, h)
  );
  const nonBlack = sample.data.some((v, i) => i % 4 !== 3 && v > 5);
  if (!nonBlack) {
    log(`WARNING: screenshot #${session.screenshots.length + 1} is a BLACK FRAME (${w}x${h})`, 'error');
  }

  // Store frame strip for dedup comparison (full-width horizontal strip from middle)
  const stripY = Math.floor(h / 2) - 4;
  session.lastFrameData = ctx.getImageData(0, Math.max(0, stripY), w, 8).data;

  // Draw marker annotation
  let marker = null;
  if (clickPoint) {
    marker = session.screenshots.length + 1;
    drawMarker(ctx, clickPoint.x, clickPoint.y, marker, canvas.width);
  } else if (boundingBox) {
    marker = session.screenshots.length + 1;
    drawSelectionBox(ctx, boundingBox, marker, canvas.width);
  }

  const dataUrl = canvas.toDataURL('image/png');
  const elapsed = (Date.now() - session.startTime) / 1000;
  const shot = { timestamp: elapsed, dataUrl };
  if (clickPoint) shot.clickPoint = { x: clickPoint.x, y: clickPoint.y, marker };
  if (boundingBox) shot.boundingBox = { ...boundingBox, marker };
  session.screenshots.push(shot);

  // Push to live MCP bridge (base64 without data URL prefix)
  pushLiveUpdate('screenshot', { base64: dataUrl.split(',')[1] });

  // Update timeline and status
  insertTimelineEntry('img', elapsed, null, dataUrl, session.timelineEl);
  updateStatusStrip();

  log(`Screenshot #${session.screenshots.length} at ${formatTime(elapsed)}`);
  } finally {
    captureInProgress = false;
  }
}

// ── Draw numbered circle marker ──
function drawMarker(ctx, x, y, number, imageWidth) {
  const radius = Math.round(imageWidth * 0.015);
  const fontSize = Math.round(radius * 1.3);

  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 38, 38, 0.9)';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = Math.max(2, radius * 0.15);
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fontSize}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(number), x, y);
}

// ── Draw selection rectangle ──
function drawSelectionBox(ctx, box, number, imageWidth) {
  const { x1, y1, x2, y2 } = box;
  const w = x2 - x1;
  const h = y2 - y1;

  ctx.fillStyle = 'rgba(220, 38, 38, 0.15)';
  ctx.fillRect(x1, y1, w, h);

  ctx.strokeStyle = 'rgba(220, 38, 38, 0.8)';
  ctx.lineWidth = Math.max(2, imageWidth * 0.002);
  ctx.strokeRect(x1, y1, w, h);

  drawMarker(ctx, x1, y1, number, imageWidth);
}

// ── Chunked audio transcription ──
function startChunkRecording(stream) {
  const mimeType = getSupportedMimeType();
  log(`Audio recording: ${mimeType}, tracks: ${stream.getAudioTracks().length}, active: ${stream.active}`, 'info');
  chunkAudioParts = [];
  chunkStartTime = (Date.now() - sessionStartTime) / 1000;

  chunkRecorder = new MediaRecorder(stream, { mimeType });
  chunkRecorder.ondataavailable = e => {
    log(`ondataavailable: size=${e.data.size}, parts=${chunkAudioParts.length}`, 'info');
    if (e.data.size > 0) chunkAudioParts.push(e.data);
  };
  chunkRecorder.onerror = (e) => {
    log(`Audio recorder error: ${e.error?.name || 'unknown'}`, 'error');
  };
  // No timeslice — stop() triggers single ondataavailable with complete file
  chunkRecorder.start();
  log(`MediaRecorder started, state: ${chunkRecorder.state}`, 'info');
}

function rotateChunk() {
  if (!chunkRecorder || chunkRecorder.state !== 'recording') return;
  if (!currentSession) return;

  const partsSnapshot = chunkAudioParts;
  const startSnapshot = chunkStartTime;
  currentSession.chunkCount++;
  const chunkNum = currentSession.chunkCount;
  const session = currentSession;  // capture in closure

  // Insert STT placeholder in timeline
  insertSTTPlaceholder(chunkNum, startSnapshot, session.timelineEl);

  // Stop current recorder — triggers finalization
  chunkRecorder.stop();
  const finalizePromise = new Promise(resolve => {
    chunkRecorder.onstop = () => {
      const mimeType = getSupportedMimeType();
      const ext = mimeType.includes('webm') ? 'webm' : mimeType.includes('mp4') ? 'mp4' : 'ogg';
      const blob = new Blob(partsSnapshot, { type: mimeType });

      if (blob.size < 1000) {
        log(`Chunk ${chunkNum} too small (${blob.size}B), skipping`, 'info');
        resolve();
        return;
      }

      const transcriptionPromise = transcribeChunk(blob, ext, startSnapshot, chunkNum, session);
      session.pendingTranscriptions.push(transcriptionPromise);
      transcriptionPromise.then(resolve);
    };
  });

  // Start new chunk immediately
  if (session.isRecording && micStreamRef) {
    startChunkRecording(micStreamRef);
  }

  return finalizePromise;
}

async function transcribeChunk(audioBlob, ext, offsetTime, chunkNum, session) {
  // Capture session in closure — use currentSession as fallback
  session = session || currentSession;

  if (!whisperLocal) {
    log(`Chunk ${chunkNum}: no STT available (whisper offline), skipping`, 'error');
    session.transcriptSegments.push({
      start: offsetTime,
      end: offsetTime + CHUNK_DURATION / 1000,
      text: '(No transcription available)'
    });
    replaceSTTPlaceholder(chunkNum, '(No transcription available)', offsetTime, session.timelineEl);
    updateStatusStrip();
    return;
  }

  // condition_on_previous_text=False equivalent: do NOT send previous transcript
  // as prompt. When whisper hallucinates, the hallucinated text seeds the next
  // chunk's prompt, creating a cascade ("thank you" x28). Killing the feedback
  // loop is more valuable than the marginal continuity benefit.
  // See docs/decisions/001-whisper-initial-prompt.md

  const formData = new FormData();
  formData.append('file', audioBlob, `chunk.${ext}`);
  formData.append('model', 'whisper-1');
  formData.append('response_format', 'verbose_json');
  formData.append('timestamp_granularities[]', 'segment');
  formData.append('temperature', '0');

  // Use /transcribe proxy which converts WebM→WAV via ffmpeg before forwarding to whisper
  const transcribeUrl = '/transcribe';
  sttActivityShow();

  try {
    const resp = await fetch(transcribeUrl, {
      method: 'POST',
      body: formData
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`${resp.status}: ${errText.slice(0, 200)}`);
    }

    const data = await resp.json();
    let segments = data.segments || [{ start: 0, end: data.duration || 0, text: data.text || '' }];

    // ── Hallucination filters ──
    // 1. Blocklist: known whisper hallucination phrases (case-insensitive exact match)
    const beforeBlocklist = segments.length;
    segments = segments.filter(seg => {
      const t = seg.text.trim().toLowerCase().replace(/[.,!?]+$/g, '');
      return !HALLUCINATION_BLOCKLIST.has(t);
    });
    const blockedCount = beforeBlocklist - segments.length;
    if (blockedCount > 0) {
      log(`Chunk ${chunkNum}: ${blockedCount} blocklisted segment(s) filtered`, 'info');
    }

    // 2. Repeated-output detection: if same text appears 3+ times in this chunk, drop all
    if (segments.length >= 3) {
      const texts = segments.map(s => s.text.trim().toLowerCase());
      const counts = {};
      for (const t of texts) counts[t] = (counts[t] || 0) + 1;
      const maxCount = Math.max(0, ...Object.values(counts));
      if (maxCount >= 3) {
        const repeatedPhrase = Object.entries(counts).find(([,c]) => c >= 3)?.[0] || '?';
        log(`Chunk ${chunkNum}: repeated output detected ("${repeatedPhrase}" x${maxCount}), dropping`, 'info');
        // Record it as a filtered segment so it shows in the timeline
        session.transcriptSegments.push({
          start: offsetTime,
          end: offsetTime + (data.duration || 10),
          text: `(filtered: repeated hallucination "${repeatedPhrase}" x${maxCount})`,
          filtered: true
        });
        // Show in live timeline
        replaceSTTPlaceholder(chunkNum, `\u26a0 Filtered: repeated "${repeatedPhrase}" x${maxCount}`, offsetTime, session.timelineEl, offsetTime + (data.duration || 10));
        session.transcribedCount++;
        updateStatusStrip();
        sttActivityDone('');
        return;
      }
    }

    // Offset timestamps by chunk start time
    for (const seg of segments) {
      session.transcriptSegments.push({
        start: seg.start + offsetTime,
        end: seg.end + offsetTime,
        text: seg.text
      });
    }

    session.transcribedCount++;
    const transcriptText = segments.map(s => s.text).join(' ').trim();
    const chunkEndTime = segments.length > 0 ? segments[segments.length - 1].end + offsetTime : null;

    // Push transcript to live MCP bridge
    if (transcriptText && transcriptText !== '(no speech detected)') {
      pushLiveUpdate('transcript', {
        text: transcriptText,
        startTime: offsetTime,
        endTime: chunkEndTime || offsetTime,
      });
    }

    replaceSTTPlaceholder(chunkNum, transcriptText || '(no speech detected)', offsetTime, session.timelineEl, chunkEndTime);
    updateStatusStrip();
    sttActivityDone(transcriptText);
    log(`Chunk ${chunkNum} transcribed (${segments.length} segments)`, 'success');
  } catch (err) {
    log(`Chunk ${chunkNum} failed: ${err.message}`, 'error');
    session.transcriptSegments.push({
      start: offsetTime,
      end: offsetTime + CHUNK_DURATION / 1000,
      text: `(Chunk ${chunkNum} transcription failed)`
    });
    session.transcribedCount++;
    replaceSTTPlaceholder(chunkNum, `(Chunk ${chunkNum} transcription failed)`, offsetTime, session.timelineEl);
    updateStatusStrip();
    sttActivityDone('');
  }
}

// ── Start session ──
async function startSession() {
  try {
    log('Requesting screen share...', 'info');
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: false
    });

    // Reuse preview mic stream if active, otherwise request new one
    if (window._previewMicStream && window._previewMicStream.active) {
      micStreamRef = window._previewMicStream;
      log('Reusing preview mic stream', 'info');
    } else {
      log('Requesting microphone...', 'info');
      micStreamRef = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    // Set up hidden video for drawImage fallback
    const video = $('captureVideo');
    video.srcObject = screenStream;

    // Create session object and capture ticketId from DOM before any await
    currentSession = createSession();
    currentSession.startTime = Date.now();
    currentSession.ticketId = $('captureTicketId') ? $('captureTicketId').value.trim() : '';
    currentSession.isRecording = true;

    // Initialize live session for MCP bridge
    const ts = new Date(currentSession.startTime).toISOString().slice(0, 19).replace(/[T:]/g, '-');
    const tid = currentSession.ticketId;
    liveSessionId = tid ? `feedbacks-${tid}-${ts}` : `feedbacks-${ts}`;
    liveSeqNum = 0;

    // Mirror startTime to page-level global for legacy code that still reads it
    sessionStartTime = currentSession.startTime;

    // Hide capture prompt
    hideCapturePrompt();

    if (RECORDER_MODE) {
      // In recorder mode, wire timeline to widget container
      currentSession.timelineEl = $('rwTimeline');
    } else {
      // Build live row and insert at top of session list
      const liveRow = createLiveRow();
      const sessionList = $('sessionList');
      const firstRow = sessionList.querySelector('.session-row');
      if (firstRow) {
        sessionList.insertBefore(liveRow, firstRow);
      } else {
        sessionList.appendChild(liveRow);
      }

      // Hide empty state
      const emptyState = $('emptyState');
      if (emptyState) emptyState.style.display = 'none';

      // Dim past session rows
      document.querySelectorAll('.session-row:not(.live)').forEach(r => r.classList.add('dimmed'));

      // Wire timeline to live row container
      currentSession.timelineEl = $('liveTimeline');

      // Disable New Capture button
      const newCaptureBtn = $('newCaptureBtn');
      if (newCaptureBtn) { newCaptureBtn.disabled = true; newCaptureBtn.textContent = 'Recording...'; }

      // Show header recording indicator
      const recIndicator = $('headerRecIndicator');
      if (recIndicator) recIndicator.classList.add('active');
    }

    // Start mic meter
    startMicMeter(micStreamRef);

    // Start status strip updates
    currentSession.statusStripIntervalId = setInterval(updateStatusStrip, 1000);
    updateStatusStrip();

    // Start chunked audio recording — initial chunk starts immediately,
    // but subsequent chunks are driven by VAD (speech start/end events).
    // The recorder captures continuously; chunks are finalized on speech end.
    startChunkRecording(micStreamRef);

    // Safety cap: force chunk rotation if speech continues for too long (>30s)
    currentSession.chunkRotationId = setInterval(() => {
      if (isSpeaking && chunkRecorder && chunkRecorder.state === 'recording') {
        const elapsed = (Date.now() - sessionStartTime) / 1000 - chunkStartTime;
        if (elapsed >= MAX_SPEECH_CHUNK_MS / 1000) {
          log('Speech chunk >30s — force rotating', 'info');
          rotateChunk(); // uses existing rotateChunk which starts a new chunk immediately
        }
      }
    }, 5000);

    // Auto-capture screenshots every second
    currentSession.screenshotIntervalId = setInterval(() => {
      captureScreenshot(currentSession).catch(e => log(`Auto-capture failed: ${e.message}`, 'error'));
    }, CAPTURE_INTERVAL);

    // Start duration timer — update live row time, header indicator, and recorder widget
    currentSession.durationIntervalId = setInterval(() => {
      const elapsed = (Date.now() - currentSession.startTime) / 1000;
      const t = formatTime(elapsed);
      const liveTime = $('liveRecTime');
      if (liveTime) liveTime.textContent = t;
      const headerTime = $('headerRecTime');
      if (headerTime) headerTime.textContent = t;
      const rwTime = $('rwTime');
      if (rwTime) rwTime.textContent = t;
    }, 500);

    // Take initial screenshot once video is ready
    const onVideoReady = async () => {
      video.removeEventListener('loadedmetadata', onVideoReady);
      log(`Video ready: ${video.videoWidth}x${video.videoHeight}`, 'info');
      // Wait a beat for the stream to deliver its first frame
      await new Promise(r => setTimeout(r, 500));
      try {
        await captureScreenshot(currentSession);
      } catch (e) {
        log(`Initial screenshot failed: ${e.message}`, 'error');
      }
    };
    if (video.videoWidth > 0 && video.videoHeight > 0) {
      onVideoReady();
    } else {
      video.addEventListener('loadedmetadata', onVideoReady);
    }

    // Handle screen share ending
    screenStream.getVideoTracks()[0].onended = () => {
      if (currentSession && currentSession.isRecording) stopSession();
    };

    log('Session started', 'success');

  } catch (err) {
    log(`Error: ${err.message}`, 'error');
    cleanup();
    // Reset recorder widget on failure
    if (RECORDER_MODE) {
      if (rwUpdateInterval) { clearInterval(rwUpdateInterval); rwUpdateInterval = null; }
      const widget = $('recorderWidget');
      if (widget) widget.classList.remove('rw-recording');
      const dot = $('rwDot');
      if (dot) dot.classList.remove('recording');
      const rwStatus = $('rwStatus');
      if (rwStatus) rwStatus.textContent = 'Failed — try again';
    }
  }
}

// ── Stop session ──
async function stopSession() {
  if (!currentSession || !currentSession.isRecording) return;
  currentSession.isRecording = false;  // SET BEFORE any await — blocks re-entrant calls

  // Signal live session end to MCP bridge
  if (liveSessionId) {
    fetch('/live-end', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: liveSessionId }),
    }).catch(() => {});
    liveSessionId = null;
  }

  // Capture reference so closures below stay bound to this session
  const session = currentSession;

  // Take final screenshot. captureScreenshot guards on session.isRecording, so
  // we momentarily re-enable it just for this call. Any concurrent call to
  // stopSession already returned at the guard above.
  session.isRecording = true;
  await captureScreenshot(session);
  session.isRecording = false;

  // Close any open speech span
  if (isSpeaking) {
    const endTime = (Date.now() - sessionStartTime) / 1000;
    const spans = session.speechSpans;
    if (spans.length > 0 && spans[spans.length - 1].end === null) {
      spans[spans.length - 1].end = endTime;
    }
    isSpeaking = false;
    speechOnsetTime = 0;
    speechOffsetTime = 0;
    updateSpeechIndicator(false);
  }

  // Stop chunk rotation and timers
  clearInterval(session.chunkRotationId);
  clearInterval(session.durationIntervalId);
  clearInterval(session.screenshotIntervalId);
  clearInterval(session.statusStripIntervalId);

  // Stop mic meter immediately — no longer recording
  stopMicMeter();

  // Clear STT activity indicator — transcriptions will complete but indicator no longer needed
  _sttActiveCount = 0;
  clearTimeout(_sttFlashTimer);
  const sttEls = [document.getElementById('liveSttActivity'), document.getElementById('rwSttActivity')];
  for (const el of sttEls) { if (el) el.classList.remove('visible', 'stt-done'); }
  const sttBar = document.getElementById('rwSttBar');
  if (sttBar) sttBar.classList.remove('active');

  // Switch recorder to processing state (handles screen-share-ended path that bypasses rwStop)
  if (RECORDER_MODE) {
    const rwDot = $('rwDot');
    if (rwDot && rwDot.classList.contains('recording')) {
      rwDot.classList.remove('recording');
      rwDot.classList.add('processing');
    }
    const rwW = $('recorderWidget');
    if (rwW && rwW.classList.contains('rw-recording')) {
      rwW.classList.remove('rw-recording');
      rwW.classList.add('rw-processing');
    }
  }

  // Update header UI immediately so it doesn't look stuck during transcription
  const headerRecIndicator = $('headerRecIndicator');
  if (headerRecIndicator) headerRecIndicator.classList.remove('active');
  const newCaptureBtnEarly = $('newCaptureBtn');
  if (newCaptureBtnEarly) { newCaptureBtnEarly.disabled = true; newCaptureBtnEarly.textContent = 'Processing...'; }

  // Finalize the last chunk
  if (chunkRecorder && chunkRecorder.state === 'recording') {
    const partsSnapshot = chunkAudioParts;
    const startSnapshot = chunkStartTime;
    session.chunkCount++;
    const chunkNum = session.chunkCount;

    // Insert placeholder for final chunk
    insertSTTPlaceholder(chunkNum, startSnapshot, session.timelineEl);

    chunkRecorder.stop();
    await new Promise(resolve => {
      chunkRecorder.onstop = () => {
        const mimeType = getSupportedMimeType();
        const ext = mimeType.includes('webm') ? 'webm' : mimeType.includes('mp4') ? 'mp4' : 'ogg';
        const blob = new Blob(partsSnapshot, { type: mimeType });

        if (blob.size >= 1000) {
          const p = transcribeChunk(blob, ext, startSnapshot, chunkNum, session);
          session.pendingTranscriptions.push(p);
          p.then(resolve);
        } else {
          resolve();
        }
      };
    });
  }

  // Stop streams
  screenStream.getTracks().forEach(t => t.stop());
  // Don't stop mic — we might reuse it

  log(`Session stopped. ${session.screenshots.length} screenshots, ${session.chunkCount} audio chunks.`);

  // ── Lifecycle: Recording → Transcribing ──
  const liveStatusEl = $('liveStatusIndicator');
  if (liveStatusEl) {
    liveStatusEl.innerHTML = '<span class="status-dot transcribing"></span><span style="font-size:0.7rem;color:#f59e0b;">Transcribing audio...</span>';
  }

  // Wait for all pending transcriptions
  await Promise.allSettled(session.pendingTranscriptions);
  log(`All ${session.transcribedCount} chunks transcribed.`, 'success');

  // Sort segments by start time (chunks may complete out of order)
  session.transcriptSegments.sort((a, b) => a.start - b.start);

  // Build output (no audio in ZIP)
  const markdown = buildMarkdown(session.transcriptSegments, session);
  session.zipBlob = await buildZip(markdown, session);

  // ── Lifecycle: Transcribing → Summarizing (update indicator before save) ──
  const liveStatusEl2 = $('liveStatusIndicator');
  if (liveStatusEl2) {
    liveStatusEl2.innerHTML = '<span class="status-dot summarizing"></span><span style="font-size:0.7rem;color:#60a5fa;">Generating summary...</span>';
  }

  // Auto-save to server
  session.savedPath = (await saveToServer(markdown, session)) || '';

  // Calculate duration
  const duration = (Date.now() - session.startTime) / 1000;

  if (session.savedPath) {
    log('Session saved to: ' + session.savedPath, 'success');
  } else {
    log('ZIP ready for download (server save failed)', 'success');
  }

  // ── Recorder widget: notify parent + auto-close ──
  if (RECORDER_MODE) {
    const sessionName = session.savedPath ? session.savedPath.split('/').filter(Boolean).pop() : null;
    const result = {
      type: 'feedbacks:session-saved',
      sessionPath: session.savedPath || null,
      sessionName: sessionName,
      ticketId: session.ticketId || null,
      duration: formatTime(duration),
      imageCount: session.screenshots.length,
      sttCount: session.transcriptSegments.length
    };

    // Notify parent window via postMessage (popup opener or iframe parent)
    const messageTarget = window.opener || (window.parent !== window ? window.parent : null);
    if (messageTarget) {
      try { messageTarget.postMessage(result, RECORDER_ORIGIN); } catch(e) {}
    }

    // Update widget to done state
    if (rwUpdateInterval) clearInterval(rwUpdateInterval);
    const widget = $('recorderWidget');
    if (widget) { widget.classList.remove('rw-recording', 'rw-processing'); widget.classList.add('rw-done'); }
    const dot = $('rwDot');
    if (dot) { dot.classList.remove('recording', 'processing'); dot.classList.add('done'); }
    const rwStatus = $('rwStatus');
    if (rwStatus) rwStatus.textContent = session.savedPath ? 'Session saved' : 'Save failed';

    // Auto-close: green 1s → countdown in status → close
    if (RECORDER_AUTOCLOSE) {
      setTimeout(() => {
        if (rwStatus) rwStatus.textContent = 'Closing in 2…';
      }, 1000);
      setTimeout(() => {
        if (rwStatus) rwStatus.textContent = 'Closing in 1…';
      }, 2000);
      setTimeout(() => {
        if (rwStatus) rwStatus.textContent = 'Closing…';
        try { window.close(); } catch(e) {}
      }, 3000);
      setTimeout(() => {
        if (!window.closed && rwStatus) {
          rwStatus.textContent = 'Saved — you can close this window';
        }
      }, 3500);
    }

    // Skip full-app live-row transition below
    const newCaptureBtn = $('newCaptureBtn');
    if (newCaptureBtn) { newCaptureBtn.disabled = false; newCaptureBtn.textContent = 'New Capture'; }
    document.querySelectorAll('.session-row').forEach(r => r.classList.remove('dimmed'));
    return;
  }

  // ── Transition live row to saved state ──
  const liveRow = $('liveSessionRow');
  if (liveRow) {
    // Remove live styling
    liveRow.classList.remove('live');
    liveRow.id = '';

    // Replace live-header with a saved session header
    const oldHeader = liveRow.querySelector('.live-header');
    if (oldHeader) {
      const savedHeader = createEl('div', 'session-row-header');

      // Placeholder thumbnail (no hero until summary.json available)
      const heroPlaceholder = createEl('div', 'row-hero-placeholder');
      heroPlaceholder.textContent = '--';
      heroPlaceholder.className = 'row-hero-placeholder';
      savedHeader.appendChild(heroPlaceholder);

      const rowInfo = createEl('div', 'row-info');
      const date = new Date(session.startTime);
      const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
                      date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const stats = formatTime(duration) + ' · ' + session.screenshots.length + ' img · ' + session.transcribedCount + ' stt';

      const line1 = createEl('div', 'row-info-line1');
      // Status indicator element for post-save lifecycle updates
      const statusIndicatorInRow = createEl('span', 'status-indicator');
      statusIndicatorInRow.innerHTML = '<span class="status-dot summarizing"></span>';
      line1.appendChild(statusIndicatorInRow);
      line1.appendChild(createEl('span', 'row-timestamp', dateStr));
      if (session.ticketId) {
        line1.appendChild(createEl('span', 'ticket-badge', session.ticketId));
      }
      line1.appendChild(createEl('span', 'row-stats', stats));
      rowInfo.appendChild(line1);
      // Line 2: summary placeholder text (updated when summary arrives)
      rowInfo.appendChild(createEl('div', 'row-info-line2', 'Generating summary...'));
      savedHeader.appendChild(rowInfo);
      savedHeader.appendChild(createEl('span', 'row-chevron', '\u25B8'));

      oldHeader.replaceWith(savedHeader);

      // Make the timeline container the detail area
      const liveTimeline = liveRow.querySelector('.live-timeline');
      if (liveTimeline) {
        liveTimeline.className = 'detail-timeline';
        // Wrap in detail section
        const detailSection = createEl('div', 'session-detail');
        const detailSummary = createEl('div', 'detail-summary');
        const detailInfo = createEl('div', 'detail-info');
        const statusText = createEl('div', 'detail-summary-text', 'Generating summary...');
        // Show savedPath immediately — visible before summarization completes
        const pathEl = createEl('div', 'detail-path', session.savedPath || '(save failed)');
        const actionsEl = createEl('div', 'detail-actions');
        const copyBtn = createEl('button', '', 'Copy path');
        copyBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const p = session.savedPath || '';
          navigator.clipboard.writeText(p).catch(() => {});
        });
        const dlBtn = createEl('button', '', 'Download ZIP');
        dlBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          downloadZip(session);
        });
        actionsEl.appendChild(copyBtn);
        actionsEl.appendChild(dlBtn);
        detailInfo.appendChild(statusText);
        detailInfo.appendChild(pathEl);
        detailInfo.appendChild(actionsEl);
        detailSummary.appendChild(detailInfo);
        detailSection.appendChild(detailSummary);
        liveTimeline.parentNode.insertBefore(detailSection, liveTimeline);
        detailSection.appendChild(liveTimeline);
        // Make expanded so timeline stays visible
        liveRow.classList.add('expanded');
      }

      // Click to toggle expand
      savedHeader.addEventListener('click', () => {
        liveRow.classList.toggle('expanded');
      });
    }

    // Set a dataset attribute so pollForSummary can find this row
    if (session.savedPath) {
      // Extract session name from path (e.g. "sessions/feedbacks-2026-..." → "feedbacks-2026-...")
      const parts = session.savedPath.split('/');
      const sessionName = parts[parts.length - 1] || parts[parts.length - 2] || '';
      if (sessionName) {
        liveRow.dataset.sessionName = sessionName;
        pollForSummary(sessionName, liveRow);
      }
    }
  }

  // Re-enable New Capture button (was set to "Processing..." earlier)
  const newCaptureBtn = $('newCaptureBtn');
  if (newCaptureBtn) { newCaptureBtn.disabled = false; newCaptureBtn.textContent = 'New Capture'; }

  // Un-dim past rows
  document.querySelectorAll('.session-row').forEach(r => r.classList.remove('dimmed'));
}

// ── Summary polling after save ──
function pollForSummary(sessionName, rowEl) {
  const delays = [3000, 3000, 5000, 5000, 10000, 10000, 15000];
  let attempt = 0;

  function poll() {
    if (attempt >= delays.length) {
      // Timeout — show "Summary unavailable" with retry button
      const statusEl = rowEl.querySelector('.status-indicator');
      if (statusEl) {
        statusEl.innerHTML = '';
        const unavailLabel = createEl('span', '', 'Summary unavailable');
        unavailLabel.style.cssText = 'color:#f59e0b;font-size:0.7rem;';
        const retryBtn = createEl('button', '', 'Retry');
        retryBtn.style.cssText = 'font-size:0.65rem;padding:0.1rem 0.3rem;margin-left:0.25rem;';
        retryBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          attempt = 0;
          statusEl.innerHTML = '<span class="status-dot summarizing"></span>';
          poll();
        });
        statusEl.appendChild(unavailLabel);
        statusEl.appendChild(retryBtn);
      }
      const line2 = rowEl.querySelector('.row-info-line2');
      if (line2 && line2.textContent === 'Generating summary...') {
        line2.textContent = 'Summary unavailable';
      }
      // Reload session list so the row gets proper data if user opens later
      loadSessions();
      return;
    }
    setTimeout(async () => {
      try {
        const resp = await fetch('/sessions');
        const sessions = await resp.json();
        const session = sessions.find(s => s.name === sessionName);
        if (session && session.summary && session.status === 'done' && !session.summaryError) {
          updateRowWithSummary(rowEl, session);
          loadedSessions = sessions;  // update cache
        } else {
          attempt++;
          poll();
        }
      } catch (e) {
        attempt++;
        poll();
      }
    }, delays[attempt]);
  }
  poll();
}

function updateRowWithSummary(rowEl, session) {
  // Update hero image in row header
  const heroEl = rowEl.querySelector('.row-hero, .row-hero-placeholder');
  if (heroEl && session.heroImage) {
    const img = document.createElement('img');
    img.className = 'row-hero';
    img.src = '/sessions/' + session.name + '/images/' + session.heroImage;
    img.alt = '';
    heroEl.replaceWith(img);
  }

  // Update collapsed row summary text (line 2)
  const line2 = rowEl.querySelector('.row-info-line2');
  if (line2) line2.textContent = session.summary || '';

  // Update status indicator in header — done state
  const statusEl = rowEl.querySelector('.status-indicator');
  if (statusEl) {
    statusEl.innerHTML = '<span class="status-dot done"></span>';
  }

  // Update expanded detail summary text
  const detailText = rowEl.querySelector('.detail-summary-text');
  if (detailText) detailText.textContent = session.summary || '';

  // Update expanded detail hero image
  if (session.heroImage) {
    const detailHero = rowEl.querySelector('.detail-hero');
    if (detailHero) {
      detailHero.src = '/sessions/' + session.name + '/images/' + session.heroImage;
    } else {
      // If detail-summary doesn't have a hero yet, prepend one
      const detailSummary = rowEl.querySelector('.detail-summary');

        heroImg.src = '/sessions/' + session.name + '/images/' + session.heroImage;

      }
    }
  }

  log('Summary loaded for ' + session.name, 'success');
}

// ── Build markdown ──
function buildMarkdown(segments, session) {
  session = session || currentSession;
  const date = new Date(session.startTime).toISOString().slice(0, 16).replace('T', ' ');
  const ticketId = session.ticketId;
  let md = `# Feedback Session — ${date}\n`;
  if (ticketId) md += `Ticket: ${ticketId}\n`;
  md += '\n';

  const shots = session.screenshots;

  if (shots.length === 0) {
    md += '> No screenshots captured.\n\n';
    for (const seg of segments) {
      md += `## ${formatTime(seg.start)} - ${formatTime(seg.end)}\n\n`;
      md += `> ${seg.text.trim()}\n\n`;
    }
    return md;
  }

  // ── Speech-span-based layout (when VAD data available) ──
  if (session.speechSpans && session.speechSpans.length > 0) {
    // Build a timeline of alternating speech/silence intervals
    const spans = session.speechSpans.filter(s => s.end !== null);
    const sessionEnd = shots.length > 0 ? shots[shots.length - 1].timestamp + 1 : 0;

    // Build intervals: [silence, speech, silence, speech, ...]
    const intervals = [];
    let cursor = 0;
    for (const span of spans) {
      if (span.start > cursor + 0.5) {
        intervals.push({ type: 'context', start: cursor, end: span.start });
      }
      intervals.push({ type: 'speech', start: span.start, end: span.end });
      cursor = span.end;
    }
    if (cursor < sessionEnd) {
      intervals.push({ type: 'context', start: cursor, end: sessionEnd });
    }

    for (const interval of intervals) {
      // Find screenshots in this interval
      const intervalShots = [];
      for (let i = 0; i < shots.length; i++) {
        if (shots[i].timestamp >= interval.start - 0.5 && shots[i].timestamp < interval.end + 0.5) {
          intervalShots.push(i);
        }
      }

      // Find transcript segments in this interval
      const intervalSegs = segments.filter(seg =>
        seg.start >= interval.start - 1 && seg.end <= interval.end + 1
      );

      if (interval.type === 'speech') {
        md += `## ${formatTime(interval.start)} – ${formatTime(interval.end)}\n\n`;
        for (const idx of intervalShots) {
          md += `![Screenshot ${idx + 1}](./images/${String(idx + 1).padStart(3, '0')}.png)\n\n`;
          const shot = shots[idx];
          if (shot.clickPoint) {
            md += `**[Marker ${shot.clickPoint.marker} — user clicked at (${shot.clickPoint.x}, ${shot.clickPoint.y})]**\n\n`;
          } else if (shot.boundingBox) {
            md += `**[Marker ${shot.boundingBox.marker} — user selected region (${shot.boundingBox.x1},${shot.boundingBox.y1})→(${shot.boundingBox.x2},${shot.boundingBox.y2})]**\n\n`;
          }
        }
        for (const seg of intervalSegs) {
          if (seg.text.trim()) md += `> ${seg.text.trim()}\n\n`;
        }
      } else {
        // Context (silence) — show one representative screenshot
        if (intervalShots.length > 0) {
          const repIdx = intervalShots[Math.floor(intervalShots.length / 2)]; // middle frame
          md += `## ${formatTime(interval.start)} – ${formatTime(interval.end)} [context]\n\n`;
          md += `![Screenshot ${repIdx + 1}](./images/${String(repIdx + 1).padStart(3, '0')}.png)\n\n`;
          if (intervalShots.length > 1) {
            md += `<!-- ${intervalShots.length - 1} similar frames hidden -->\n\n`;
          }
        }
      }
    }
    return md;
  }

  // ── Fallback: assign each transcript to closest screenshot by midpoint ──
  const segAssignments = new Map();
  for (const seg of segments) {
    const segMid = (seg.start + seg.end) / 2;
    let bestIdx = 0;
    let bestDist = Infinity;
    for (let i = 0; i < shots.length; i++) {
      const dist = Math.abs(shots[i].timestamp - segMid);
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    }
    if (!segAssignments.has(bestIdx)) segAssignments.set(bestIdx, []);
    segAssignments.get(bestIdx).push(seg);
  }

  for (let i = 0; i < shots.length; i++) {
    const shot = shots[i];
    const nextShot = shots[i + 1];
    md += `## ${formatTime(shot.timestamp)}`;
    if (nextShot) md += ` - ${formatTime(nextShot.timestamp)}`;
    md += `\n\n`;
    md += `![Screenshot ${i + 1}](./images/${String(i + 1).padStart(3, '0')}.png)\n\n`;
    if (shot.clickPoint) {
      md += `**[Marker ${shot.clickPoint.marker} — user clicked at (${shot.clickPoint.x}, ${shot.clickPoint.y})]**\n\n`;
    } else if (shot.boundingBox) {
      md += `**[Marker ${shot.boundingBox.marker} — user selected region (${shot.boundingBox.x1},${shot.boundingBox.y1})→(${shot.boundingBox.x2},${shot.boundingBox.y2})]**\n\n`;
    }
    const assigned = segAssignments.get(i) || [];
    for (const seg of assigned) {
      if (seg.text.trim()) md += `> ${seg.text.trim()}\n\n`;
    }
  }
  return md;
}

// ── Build ZIP (no audio) ──
async function buildZip(markdown, session) {
  session = session || currentSession;
  const zip = new JSZip();
  zip.file('session.md', markdown);

  const imgFolder = zip.folder('images');
  for (let i = 0; i < session.screenshots.length; i++) {
    const dataUrl = session.screenshots[i].dataUrl;
    const base64 = dataUrl.split(',')[1];
    imgFolder.file(`${String(i + 1).padStart(3, '0')}.png`, base64, { base64: true });
  }

  // Build session player
  const sessionData = {
    date: new Date(session.startTime).toISOString(),
    ticketId: session.ticketId || null,
    slides: session.screenshots.map((shot, i) => {
      const nextShot = session.screenshots[i + 1];
      const startT = shot.timestamp;
      const endT = nextShot ? nextShot.timestamp : startT + 5;
      const transcript = session.transcriptSegments
        .filter(seg => seg.start < endT && seg.end > startT)
        .map(seg => seg.text.trim())
        .join(' ');
      return {
        image: shot.dataUrl,
        timestamp: startT,
        duration: endT - startT,
        marker: shot.clickPoint || shot.boundingBox || null,
        transcript
      };
    })
  };
  // Validate player data
  const firstImgLen = sessionData.slides[0]?.image?.length || 0;
  log(`Player data: ${sessionData.slides.length} slides, first image: ${(firstImgLen/1024).toFixed(0)}KB`);

  zip.file('player.html', buildPlayerHtml(sessionData));

  log('Building ZIP...');
  const blob = await zip.generateAsync({ type: 'blob' });
  log(`ZIP size: ${(blob.size / 1024 / 1024).toFixed(2)} MB`);
  return blob;
}

// ── Save session to server filesystem ──
async function saveToServer(markdown, session) {
  session = session || currentSession;
  try {
    const ts = new Date(session.startTime).toISOString().slice(0, 19).replace(/[T:]/g, '-');
    const ticketId = session.ticketId;
    const name = ticketId ? `feedbacks-${ticketId}-${ts}` : `feedbacks-${ts}`;

    // Build player HTML for saving
    const sessionData = {
      date: new Date(session.startTime).toISOString(),
      ticketId: ticketId || null,
      slides: session.screenshots.map((shot, i) => {
        const nextShot = session.screenshots[i + 1];
        const startT = shot.timestamp;
        const endT = nextShot ? nextShot.timestamp : startT + 5;
        const transcript = session.transcriptSegments
          .filter(seg => seg.start < endT && seg.end > startT)
          .map(seg => seg.text.trim())
          .join(' ');
        return {
          image: shot.dataUrl,
          timestamp: startT,
          duration: endT - startT,
          marker: shot.clickPoint || shot.boundingBox || null,
          transcript
        };
      })
    };

    const duration = formatTime((Date.now() - session.startTime) / 1000);

    const payload = {
      name,
      markdown,
      player: buildPlayerHtml(sessionData),
      images: session.screenshots.map((shot, i) => ({
        filename: `${String(i + 1).padStart(3, '0')}.png`,
        base64: shot.dataUrl.split(',')[1]
      })),
      log: logHistory.join('\n'),
      ticketId: session.ticketId,
      startTime: new Date(session.startTime).toISOString(),
      duration,
      sttCount: session.transcriptSegments.length,
      speechSpans: session.speechSpans.filter(s => s.end !== null)
    };

    log('Saving to server...');
    const resp = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await resp.json();
    if (result.ok) {
      return result.path;
    } else {
      log(`Server save failed: ${result.error}`, 'error');
      return null;
    }
  } catch (err) {
    log(`Server save unavailable: ${err.message}`, 'error');
    return null;
  }
}

      $('markerInfo').textContent = 'Marker ' + s.marker.marker + ' — clicked at (' + s.marker.x + ', ' + s.marker.y + ')';
    } else if (s.marker.marker && s.marker.x1 !== undefined) {
      $('markerInfo').textContent = 'Marker ' + s.marker.marker + ' — selected region (' + s.marker.x1 + ',' + s.marker.y1 + ')→(' + s.marker.x2 + ',' + s.marker.y2 + ')';
    } else {
      $('markerInfo').textContent = '';
    }
  } else {
    $('markerInfo').textContent = '';
  }

  // Update timeline
  $('timelineFill').style.width = (s.timestamp / totalDuration * 100) + '%';
  markersEl.querySelectorAll('.timeline-tick').forEach((t,i) => {
    t.classList.toggle('current', i === current);
  });
}

function togglePlay() {
  if (playing) pause(); else play();
}

function play() {
  playing = true;
  $('playBtn').innerHTML = '&#10074;&#10074; Pause';
  $('playBtn').classList.add('active');
  scheduleNext();
}

function pause() {
  playing = false;
  clearTimeout(timer);
  $('playBtn').innerHTML = '&#9654; Play';
  $('playBtn').classList.remove('active');
}

function scheduleNext() {
  if (!playing) return;
  if (current >= slides.length - 1) { pause(); return; }
  const dur = slides[current].duration * 1000 / speed;
  timer = setTimeout(() => { next(); scheduleNext(); }, dur);
}

function next() {
  if (current < slides.length - 1) { show(current + 1); if (playing) { clearTimeout(timer); scheduleNext(); } }
}

function prev() {
  if (current > 0) { show(current - 1); if (playing) { clearTimeout(timer); scheduleNext(); } }
}

function onTimelineClick(e) {
  const rect = $('timeline').getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const targetTime = pct * totalDuration;
  let closest = 0;
  for (let i = 0; i < slides.length; i++) {
    if (Math.abs(slides[i].timestamp - targetTime) < Math.abs(slides[closest].timestamp - targetTime)) closest = i;
  }
  show(closest);
  if (playing) { clearTimeout(timer); scheduleNext(); }
}

function onSpeedChange() {
  speed = parseFloat($('speed').value);
  if (playing) { clearTimeout(timer); scheduleNext(); }
}

function fmtTime(s) {
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); next(); }
  if (e.code === 'ArrowLeft') { e.preventDefault(); prev(); }
});

show(0);
<\/script>

// ── Download ──
function downloadZip(sess) {
  const session = sess || currentSession;
  if (!session || !session.zipBlob) return;
  const url = URL.createObjectURL(session.zipBlob);
  const a = document.createElement('a');
  const ts = new Date(session.startTime).toISOString().slice(0, 19).replace(/[T:]/g, '-');
  const prefix = session.ticketId ? `feedbacks-${session.ticketId}-` : 'feedbacks-';
  a.href = url;
  a.download = `${prefix}${ts}.zip`;
  a.click();
  URL.revokeObjectURL(url);
  log('Download started');
}

// ── Helpers ──
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg;codecs=opus'];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return 'audio/webm';
}

function cleanup() {
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  if (micStreamRef) micStreamRef.getTracks().forEach(t => t.stop());
  if (currentSession) {
    clearInterval(currentSession.durationIntervalId);
    clearInterval(currentSession.chunkRotationId);
    clearInterval(currentSession.screenshotIntervalId);
    clearInterval(currentSession.statusStripIntervalId);
    currentSession.isRecording = false;
  }
  stopMicMeter();
}

// ── Recorder Widget ──
let rwUpdateInterval = null;

function initRecorderWidget() {
  document.body.classList.add('recorder-mode');

  // Show ticket badge if provided
  const ticket = _params.get('ticket');
  if (ticket) {
    const rwTicket = $('rwTicket');
    if (rwTicket) { rwTicket.textContent = ticket.trim().toUpperCase(); rwTicket.classList.add('visible'); }
    // Pre-fill hidden captureTicketId so startSession() reads it
    if ($('captureTicketId')) $('captureTicketId').value = ticket.trim().toUpperCase();
  }

  if (RECORDER_TITLE) {
    const rwTicket = $('rwTicket');
    if (rwTicket && !ticket) { rwTicket.textContent = RECORDER_TITLE; rwTicket.classList.add('visible'); }
  }

  if (RECORDER_AUTOSTART) {
    setTimeout(() => rwStart(), 200);
  }

  // Warn before closing during active recording
  window.addEventListener('beforeunload', (e) => {
    if (currentSession && currentSession.isRecording) {
      e.preventDefault();
    }
  });
}

async function rwStart() {
  const widget = $('recorderWidget');
  const status = $('rwStatus');

  if (status) status.textContent = 'Starting capture...';

  await startSession();

  if (currentSession && currentSession.isRecording) {
    if (widget) widget.classList.add('rw-recording');
    if (status) status.textContent = '';
    const dot = $('rwDot');
    if (dot) dot.classList.add('recording');
    // Update widget stats on interval
    rwUpdateInterval = setInterval(rwUpdateDisplay, 500);
  } else {
    // startSession failed (user cancelled screen share, etc.)
    if (widget) widget.classList.remove('rw-recording');
    if (status) status.textContent = 'Cancelled — try again';
  }
}

function rwStop() {
  const stopBtn = $('rwStopBtn');
  if (stopBtn) { stopBtn.disabled = true; stopBtn.textContent = 'Saving...'; }
  const status = $('rwStatus');
  if (status) status.textContent = 'Processing...';
  if (rwUpdateInterval) { clearInterval(rwUpdateInterval); rwUpdateInterval = null; }
  // Immediately switch to processing state (blue border + blue dot)
  const dot = $('rwDot');
  if (dot) { dot.classList.remove('recording'); dot.classList.add('processing'); }
  const rwWidget = $('recorderWidget');
  if (rwWidget) { rwWidget.classList.remove('rw-recording'); rwWidget.classList.add('rw-processing'); }
  stopSession().catch(err => {
    log('Recorder stop error: ' + err.message, 'error');
    if (stopBtn) { stopBtn.disabled = false; stopBtn.textContent = 'Finish'; }
    if (dot) { dot.classList.remove('processing'); }
    if (rwWidget) { rwWidget.classList.remove('rw-processing'); }
    if (status) status.textContent = 'Error — try again';
  });
}

function rwUpdateDisplay() {
  if (!currentSession) return;
  // Timer
  const elapsed = (Date.now() - currentSession.startTime) / 1000;
  const rwTime = $('rwTime');
  if (rwTime) rwTime.textContent = formatTime(elapsed);
  // Stats
  const rwImg = $('rwImgCount');
  if (rwImg) rwImg.textContent = currentSession.screenshots.length + ' img';
  const rwStt = $('rwSttCount');
  if (rwStt) rwStt.textContent = currentSession.transcribedCount + '/' + currentSession.chunkCount + ' stt';
}

// ── Init ──
// Start whisper health check targeting header elements
checkWhisper();
whisperCheckId = setInterval(checkWhisper, 5000);

// Initialize mic preview
initMicPreview();

if (RECORDER_MODE) {
  initRecorderWidget();
} else {
  // Load existing sessions into list
  loadSessions();

  // Pre-fill capture ticket from URL query param
  const _urlTicket = _params.get('ticket');
  if (_urlTicket && $('captureTicketId')) {
    $('captureTicketId').value = _urlTicket.trim().toUpperCase();
  }
}
