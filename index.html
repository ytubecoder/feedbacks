<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedbacks — Screen + Voice Capture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── CSS custom properties (shadcn zinc dark + violet accent) ── */
  :root {
    --bg:            #09090b;
    --card:          #0a0a0a;
    --surface:       #18181b;
    --surface-2:     #1c1c1f;
    --border:        rgba(255,255,255,0.06);
    --border-hover:  rgba(255,255,255,0.12);
    --text:          #fafafa;
    --text-muted:    #a1a1aa;
    --text-dim:      #52525b;
    --text-faint:    #3f3f46;
    --accent:        #a78bfa;
    --accent-dim:    rgba(167,139,250,0.1);
    --accent-border: rgba(167,139,250,0.25);
    --destructive:   #ef4444;
    --success:       #4ade80;
    --info:          #60a5fa;
    --radius:        0.625rem;
    --radius-sm:     0.375rem;
    --ease-out:      cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, Inter, 'Segoe UI', system-ui, sans-serif;
    font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── App Header ── */
  #appHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    height: 3rem;
    border-bottom: 1px solid var(--border);
    background: rgba(9,9,11,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .header-left { display: flex; align-items: center; gap: 0.5rem; }

  #appHeader h1 {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.025em;
    display: flex;
    align-items: center;
    gap: 0.375rem;
  }
  #appHeader h1::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
  }

  .header-right { display: flex; align-items: center; gap: 0.625rem; }

  /* Status pill badges */
  .header-status {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.6875rem;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 0.1875rem 0.5rem;
    transition: color 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
  }

  /* Header recording indicator */
  #headerRecIndicator { display: none; align-items: center; gap: 0.4rem; }
  #headerRecIndicator.active { display: inline-flex; }
  #headerRecTime {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.75rem;
    color: #f87171;
    font-variant-numeric: tabular-nums;
  }
  #headerStopBtn {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
    padding: 0 0.75rem;
    height: 1.875rem;
    border-radius: 9999px;
    font-size: 0.6875rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    transition: all 0.2s var(--ease-out);
  }
  #headerStopBtn:hover:not(:disabled) {
    background: rgba(239,68,68,0.22);
    border-color: rgba(239,68,68,0.5);
    color: #fca5a5;
  }

  /* Split button group */
  .split-btn {
    display: inline-flex;
    align-items: stretch;
  }
  .split-btn #newCaptureBtn {
    background: var(--accent);
    border: 1px solid transparent;
    color: #09090b;
    padding: 0 0.75rem;
    height: 1.875rem;
    font-size: 0.8125rem;
    font-weight: 600;
    border-radius: 9999px 0 0 9999px;
    letter-spacing: -0.01em;
    transition: all 0.2s var(--ease-out);
    box-shadow: 0 0 0 0 rgba(167,139,250,0);
  }
  .split-btn #newCaptureBtn:hover:not(:disabled) {
    background: #c4b5fd;
    box-shadow: 0 0 12px rgba(167,139,250,0.35);
  }
  .split-btn #newCaptureDropdown {
    background: var(--accent);
    border: 1px solid transparent;
    border-left: 1px solid rgba(9,9,11,0.2);
    color: #09090b;
    padding: 0 0.4rem;
    height: 1.875rem;
    font-size: 0.7rem;
    font-weight: 600;
    border-radius: 0 9999px 9999px 0;
    cursor: pointer;
    transition: all 0.2s var(--ease-out);
  }
  .split-btn #newCaptureDropdown:hover:not(:disabled) {
    background: #c4b5fd;
  }

  /* ── Capture Prompt ── */
  #capturePrompt {
    display: none;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border-bottom: 2px solid var(--accent-border);
    border-top: none;
    align-items: center;
    gap: 0.625rem;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  #capturePrompt.active { display: flex; }

  .capture-prompt-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
  }

  #capturePrompt input {
    background: var(--bg);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 0 0.75rem;
    font-size: 0.8125rem;
    width: 180px;
    outline: none;
    height: 2rem;
    font-family: inherit;
    transition: border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
  }
  #capturePrompt input::placeholder { color: var(--text-dim); }
  #capturePrompt input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(167,139,250,0.2);
  }

  /* ── Session List ── */
  #sessionList {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  /* ── Empty State ── */
  #emptyState {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--text-dim);
    padding: 5rem 1rem 4rem;
    text-align: center;
    flex: 1;
  }
  .empty-icon {
    width: 52px;
    height: 52px;
    border-radius: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--text-faint);
  }
  .empty-title {
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: -0.015em;
  }
  .empty-desc {
    font-size: 0.8125rem;
    color: var(--text-dim);
    max-width: 260px;
    line-height: 1.5;
    margin-top: -0.25rem;
  }
  .empty-cta {
    margin-top: 0.25rem;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    padding: 0 1rem;
    height: 2rem;
    font-size: 0.8125rem;
    font-weight: 500;
    border-radius: 9999px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s var(--ease-out);
    white-space: nowrap;
  }
  .empty-cta:hover { background: rgba(167,139,250,0.18); border-color: rgba(167,139,250,0.4); }

  /* ── Session Row ── */
  .session-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: opacity 0.2s var(--ease-out), border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .session-row:not(.live):not(.dimmed):hover {
    border-color: var(--border-hover);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    transform: translateY(-1px);
  }
  .session-row.dimmed { opacity: 0.22; pointer-events: none; }

  .session-row-header {
    display: flex;
    align-items: center;
    padding: 0.75rem 0.875rem;
    gap: 0.75rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s var(--ease-out);
  }
  .session-row-header:hover { background: rgba(255,255,255,0.03); }
  .session-row-header:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  .row-hero {
    width: 72px;
    height: 48px;
    object-fit: cover;
    border-radius: 0.375rem;
    border: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    transition: border-color 0.2s var(--ease-out);
  }
  .session-row-header:hover .row-hero { border-color: var(--border-hover); }

  .row-hero-placeholder {
    width: 72px;
    height: 48px;
    border-radius: 0.375rem;
    border: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent; /* hide the '--' text from JS */
    font-size: 0;
    position: relative;
  }
  /* CSS-only image icon */
  .row-hero-placeholder::after {
    content: '';
    width: 18px;
    height: 14px;
    border: 1.5px solid var(--text-faint);
    border-radius: 2px;
    position: absolute;
    opacity: 0.5;
  }

  .row-info { flex: 1; min-width: 0; }
  .row-info-line1 {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: -0.015em;
  }
  .row-timestamp { color: var(--text); white-space: nowrap; }
  .ticket-badge {
    font-size: 0.625rem;
    padding: 0.15rem 0.4rem;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    border-radius: 9999px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .row-stats {
    font-size: 0.6875rem;
    color: var(--text-faint);
    margin-left: auto;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .row-info-line2 {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0.75;
  }
  .row-chevron {
    color: var(--text-faint);
    font-size: 0.6875rem;
    flex-shrink: 0;
    transition: transform 0.2s var(--ease-out), color 0.2s var(--ease-out);
  }
  .session-row-header:hover .row-chevron { color: var(--text-dim); }
  .session-row.expanded .row-chevron { transform: rotate(90deg); color: var(--accent); }

  /* ── Session Row Expanded Detail ── */
  .session-detail { display: none; border-top: 1px solid var(--border); background: var(--surface); }
  .session-row.expanded .session-detail { display: block; }

  .detail-summary {
    display: flex;
    gap: 1rem;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .detail-hero {
    width: 240px;
    height: 150px;
    object-fit: cover;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .detail-info { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
  .detail-summary-text {
    font-size: 0.8125rem;
    color: var(--text-muted);
    line-height: 1.6;
    flex: 1;
  }
  .detail-path {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.625rem;
    color: var(--text-dim);
    word-break: break-all;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0.25rem;
    padding: 0.25rem 0.375rem;
  }
  .detail-actions { display: flex; gap: 0.375rem; }
  .detail-actions button {
    font-size: 0.6875rem;
    padding: 0 0.625rem;
    height: 1.875rem;
    background: transparent;
    border-color: var(--border-hover);
    color: var(--text-muted);
  }
  .detail-actions button:hover:not(:disabled) {
    background: var(--surface-2);
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }
  /* ── Detail Timeline (vertical spine) ── */
  .detail-timeline {
    max-height: 500px;
    overflow-y: auto;
    padding: 1rem 1rem 1rem 2.5rem;
    position: relative;
  }
  .detail-timeline::before {
    content: '';
    position: absolute;
    left: 1.25rem;
    top: 1rem;
    bottom: 1rem;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent), rgba(167,139,250,0.08));
    border-radius: 1px;
  }
  .detail-timeline .tl-entry {
    position: relative;
    padding: 0 0 1.25rem 0;
    border-bottom: none;
    display: block;
  }
  .detail-timeline .tl-entry:last-child { padding-bottom: 0; }
  .detail-timeline .tl-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--bg);
    position: absolute;
    left: -1.65rem;
    top: 0.25rem;
    z-index: 1;
    transition: background 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
  }
  .detail-timeline .tl-entry:hover .tl-dot {
    background: var(--accent);
    border-color: var(--accent);
  }
  .detail-timeline .tl-timestamp {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.6875rem;
    color: var(--text-faint);
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }
  .detail-timeline .tl-content {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .detail-timeline .tl-screenshot {
    width: 260px;
    height: auto;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
    cursor: pointer;
  }
  .detail-timeline .tl-screenshot:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    border-color: var(--border-hover);
  }
  .detail-timeline .tl-transcript {
    font-size: 0.8125rem;
    color: var(--text-muted);
    line-height: 1.6;
    padding-top: 0.125rem;
    font-style: italic;
    flex: 1;
    min-width: 0;
  }
  .detail-timeline .tl-marker-info {
    font-size: 0.75rem;
    color: var(--text-dim);
    padding-top: 0.125rem;
  }
  /* Context (silence) entries — muted, smaller */
  .detail-timeline .tl-entry.tl-context {
    opacity: 0.45;
    padding: 0.5rem 0;
  }
  .detail-timeline .tl-entry.tl-context .tl-dot {
    border-color: var(--text-faint);
    width: 7px;
    height: 7px;
  }
  .detail-timeline .tl-entry.tl-context .tl-screenshot {
    width: 160px;
  }
  .detail-timeline .tl-entry.tl-context:hover {
    opacity: 0.8;
  }

  /* ── Live Recording Row ── */
  .session-row.live {
    border-color: rgba(239,68,68,0.2);
    border-left: 2px solid var(--destructive);
    background: rgba(239,68,68,0.03);
    animation: live-pulse-bg 3s ease-in-out infinite;
    box-shadow: 0 0 0 1px rgba(239,68,68,0.08), 0 2px 8px rgba(0,0,0,0.5);
  }
  @keyframes live-pulse-bg {
    0%, 100% { box-shadow: 0 0 0 1px rgba(239,68,68,0.08), 0 2px 8px rgba(0,0,0,0.5); }
    50%       { box-shadow: 0 0 0 1px rgba(239,68,68,0.18), 0 2px 16px rgba(239,68,68,0.1); }
  }

  /* Speaking state — green accent when VAD detects voice */
  .session-row.live.speaking {
    border-left-color: var(--success);
    box-shadow: 0 0 0 1px rgba(74,222,128,0.15), 0 2px 12px rgba(74,222,128,0.08);
  }
  .mic-bars.speaking .mic-bar.active { background: #22c55e; }

  .live-header {
    display: flex;
    align-items: center;
    padding: 0.625rem 0.875rem;
    gap: 0.625rem;
    border-bottom: 1px solid rgba(239,68,68,0.12);
    background: rgba(239,68,68,0.04);
  }
  .live-rec-indicator { display: flex; align-items: center; gap: 0.35rem; }
  .live-rec-label {
    font-size: 0.6875rem;
    color: #f87171;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .live-time {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.8125rem;
    color: #f87171;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .live-stats {
    font-size: 0.6875rem;
    color: var(--text-dim);
    margin-left: auto;
    display: flex;
    gap: 0.625rem;
    align-items: center;
  }
  .live-timeline { max-height: 50vh; overflow-y: auto; padding: 0.375rem 0.875rem; }

  /* Status indicator wrapper and dots */
  .status-indicator { display: inline-flex; align-items: center; gap: 0.25rem; flex-shrink: 0; }
  .status-dot { width: 5px; height: 5px; border-radius: 9999px; display: inline-block; flex-shrink: 0; }
  .status-dot.recording { background: var(--destructive); animation: pulse 1.5s ease-in-out infinite; }
  .status-dot.transcribing { background: #f59e0b; }
  .status-dot.summarizing { background: var(--info); animation: pulse 2s ease-in-out infinite; }
  .status-dot.done { background: var(--success); }
  .status-dot.pending { background: #f59e0b; animation: pulse 2s ease-in-out infinite; }

  /* Transcription activity indicator */
  .stt-activity {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.7rem;
    color: var(--muted-fg);
    overflow: hidden;
    white-space: nowrap;
    max-width: 0;
    opacity: 0;
    transition: max-width 0.3s ease, opacity 0.3s ease;
  }
  .stt-activity.visible {
    max-width: 220px;
    opacity: 1;
  }
  .stt-activity .stt-dots {
    display: inline-flex;
    gap: 2px;
  }
  .stt-activity .stt-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #f59e0b;
    animation: sttBounce 1.2s ease-in-out infinite;
  }
  .stt-activity .stt-dots span:nth-child(2) { animation-delay: 0.2s; }
  .stt-activity .stt-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes sttBounce {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }
  .stt-activity .stt-text {
    color: #f59e0b;
    font-weight: 500;
  }
  .stt-activity.stt-done .stt-text {
    color: var(--success);
  }

  /* Status badge (pill with dot + label) */
  .status-badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    font-size: 0.625rem; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase;
    padding: 0.125rem 0.5rem 0.125rem 0.375rem;
    border-radius: 9999px; border: 1px solid transparent;
    white-space: nowrap;
  }
  .status-badge.recording { color: var(--destructive); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); }
  .status-badge.transcribing { color: #f59e0b; background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); }
  .status-badge.summarizing { color: var(--info); background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.2); }
  .status-badge.done { color: var(--success); background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.15); }
  .status-badge.pending { color: #f59e0b; background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); }

  /* check-dot used in header STT/Mic status indicators */
  .check-dot {
    width: 5px;
    height: 5px;
    border-radius: 9999px;
    background: var(--text-faint);
    flex-shrink: 0;
  }
  .check-dot.green { background: var(--success); box-shadow: 0 0 4px rgba(74,222,128,0.5); }
  .check-dot.blue  { background: var(--info); }
  .check-dot.red   { background: #f87171; }

  /* Mic level bars */
  .mic-bars { display: flex; gap: 2px; align-items: flex-end; }
  .mic-bars.large { height: 14px; }
  .mic-bars.mini  { height: 10px; }
  .mic-bar {
    border-radius: 1px;
    background: var(--surface-2);
    transition: height 0.08s ease-out;
  }
  .mic-bars.large .mic-bar { width: 3px; }
  .mic-bars.mini  .mic-bar { width: 2px; }
  .mic-bar.active { background: var(--success); }

  button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-sm);
    padding: 0 1rem;
    height: 2.25rem;
    font-size: 0.8125rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s var(--ease-out);

  }
  button:hover:not(:disabled) {
    background: var(--surface-2);
    border-color: rgba(255,255,255,0.18);
    color: var(--text);
  }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  .rec-dot {
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: var(--destructive);

  }

  @keyframes pulse {

  }

  /* Timeline feed */
  .timeline-feed {
    flex: 1;
    overflow-y: auto;
    padding: 0.375rem 0.875rem;
  }

  .tl-entry {
    display: flex;
    gap: 0.625rem;
    padding: 0.625rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    align-items: flex-start;
  }
  .tl-entry:last-child { border-bottom: none; }

  .tl-time {
    color: var(--text-faint);
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.625rem;
    min-width: 32px;
    padding-top: 3px;
    flex-shrink: 0;
  }

  .tl-badge {
    font-size: 0.5625rem;
    padding: 0.125rem 0.375rem;
    border-radius: 0.375rem;
    font-weight: 600;
    flex-shrink: 0;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 700;
  }
  /* Replace text badges with colored dots + subtle bg */
  .tl-badge.img {
    background: rgba(74,222,128,0.08);
    color: var(--success);
    border: 1px solid rgba(74,222,128,0.18);

    height: 1.25rem;
    display: flex;

    justify-content: center;

  }
  .tl-badge.stt {
    background: rgba(96,165,250,0.08);
    color: var(--info);
    border: 1px solid rgba(96,165,250,0.18);

    width: 1.5rem;
    height: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .tl-body { flex: 1; min-width: 0; }

  .tl-body img {
    max-width: 220px;
    max-height: 124px;

  .tl-body img:hover {

  .tl-body .tl-text {
    font-size: 0.8125rem;
    color: var(--text-muted);

  .tl-entry.pending { opacity: 0.7; animation: pulse 2s ease-in-out infinite; }
  .tl-entry.pending .tl-text { font-style: italic; color: var(--text-muted); }
  .tl-entry.filtered .tl-text { font-style: italic; color: #f59e0b; opacity: 0.6; font-size: 0.75rem; }

  /* Diagnostics — nearly invisible until hovered */
  .diagnostics {
    border-top: 1px solid var(--border);
    padding: 0.25rem 1rem;
    background: var(--bg);
    transition: opacity 0.2s var(--ease-out);

  }
  .diagnostics:hover { opacity: 1; }
  .diagnostics summary {
    cursor: pointer;
    color: var(--text-faint);
    font-size: 0.625rem;
    user-select: none;
    list-style: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 0.25rem 0;
  }
  .diagnostics summary::-webkit-details-marker { display: none; }
  .diagnostics .diag-summary {
    padding: 0.25rem 0;
    color: var(--text-faint);
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.5625rem;
    line-height: 1.6;
  }
  .diagnostics .log {
    max-height: 150px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.625rem;
    color: var(--text-dim);
    line-height: 1.5;
    padding-top: 0.25rem;
    border-top: 1px solid var(--border);
  }
  .log .error   { color: #f87171; }
  .log .success { color: var(--success); }
  .log .info    { color: var(--info); }

  .copy-btn {
    font-size: 0.625rem;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.125rem 0.375rem;
    height: auto;
    background: transparent;
    cursor: pointer;

  }
  .copy-btn:hover {
    color: var(--text-muted);
    border-color: var(--border-hover);

  }

  /* Scrollbar styling for timeline areas */
  .timeline-feed::-webkit-scrollbar,
  .live-timeline::-webkit-scrollbar,
  .detail-timeline::-webkit-scrollbar { width: 4px; }
  .timeline-feed::-webkit-scrollbar-track,
  .live-timeline::-webkit-scrollbar-track,
  .detail-timeline::-webkit-scrollbar-track { background: transparent; }
  .timeline-feed::-webkit-scrollbar-thumb,
  .live-timeline::-webkit-scrollbar-thumb,
  .detail-timeline::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 9999px; }

  @media (prefers-reduced-motion: reduce) {
    .rec-dot,
    .status-dot.recording,
    .status-dot.summarizing,
    .session-row.live { animation: none; opacity: 0.7; }
    .session-row:not(.live):not(.dimmed):hover { transform: none; }
  }

  /* Hidden capture video */
  #captureVideo { display: none; }

  /* ═══ Recorder Widget Mode ═══ */
  #recorderWidget { display: none; }

  body.recorder-mode #appHeader,
  body.recorder-mode #sessionList,
  body.recorder-mode #capturePrompt,
  body.recorder-mode .diagnostics,
  body.recorder-mode #emptyState { display: none !important; }

  body.recorder-mode {
    min-height: auto;
    height: 100vh;
    overflow: hidden;
    padding: 0;
  }

  body.recorder-mode #recorderWidget {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    padding: 0.75rem;
    box-sizing: border-box;
    gap: 0.5rem;
    border: 3px solid var(--border);

  }
  #recorderWidget.rw-processing {
    border-color: #3b82f6;
    background: rgba(59,130,246,0.03);
  }
  #recorderWidget.rw-done {
    border-color: var(--success);
    background: rgba(74,222,128,0.03);
  }

  .rw-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .rw-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .rw-dot.recording {
    background: var(--destructive);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .rw-dot.processing {
    background: #3b82f6;
    animation: none;
  }
  .rw-dot.done {
    background: var(--success);
    animation: none;

  .rw-time {
    font-size: 1.1rem;
    font-weight: 600;

  .rw-ticket {
    font-size: 0.65rem;
    font-weight: 600;

    letter-spacing: 0.05em;

    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    display: none; /* shown via JS when ticket present */
  }
  .rw-ticket.visible { display: inline; }

  .rw-meter-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .rw-meter-row .mic-bars {
    gap: 2px;
  }

  .rw-stats {
    display: flex;
    gap: 0.75rem;
    font-size: 0.7rem;
    color: var(--muted-fg);
  }

  .rw-timeline {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.25rem;
  }

  /* Compact timeline entries in widget */
  .rw-timeline .tl-entry {
    padding: 0.15rem 0.25rem;
    gap: 0.25rem;
  }
  .rw-timeline .tl-time { font-size: 0.6rem; }
  .rw-timeline .tl-badge { font-size: 0.55rem; padding: 0 0.2rem; }
  .rw-timeline .tl-body { font-size: 0.65rem; }
  .rw-timeline .tl-body img { max-height: 40px; }

  .rw-controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }

  .rw-btn {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.4rem 1.2rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .rw-btn:hover { opacity: 0.85; }
  .rw-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .rw-start {
    background: var(--accent);
    color: #fff;
  }
  .rw-stop {
    background: var(--destructive);
    color: #fff;
  }
  /* Toggle start/stop buttons based on widget state */
  #recorderWidget:not(.rw-recording) .rw-stop { display: none; }
  #recorderWidget.rw-recording .rw-start { display: none; }
  #recorderWidget.rw-done .rw-stop,
  #recorderWidget.rw-done .rw-start { display: none; }
  #recorderWidget.rw-processing .rw-stop,
  #recorderWidget.rw-processing .rw-start { display: none; }

  .rw-status {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted-fg);
    min-height: 1rem;
    position: relative;
  }

  /* Bottom indicator bars */
  .rw-indicator {
    position: relative;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
  }
  .rw-indicator-rec {
    height: 4px;
    background: var(--destructive);
    opacity: 0;
    border-radius: 2px;
    transition: opacity 0.3s;
  }
  #recorderWidget.rw-recording .rw-indicator-rec {
    opacity: 1;
    animation: recGlow 2s ease-in-out infinite;
  }
  @keyframes recGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .rw-indicator-stt {
    height: 2px;
    background: var(--info);
    opacity: 0;
    border-radius: 1px;
    margin-bottom: 2px;
    transition: opacity 0.3s;
  }
  .rw-indicator-stt.active {
    opacity: 1;
  }

  #recorderWidget.rw-processing .rw-indicator-rec {
    background: #3b82f6;
    opacity: 1;
    animation: none;
  }
  #recorderWidget.rw-done .rw-indicator-rec {
    background: var(--success);
    opacity: 1;
    animation: none;
  }

  /* Scrollbar for widget timeline */
  .rw-timeline::-webkit-scrollbar { width: 4px; }
  .rw-timeline::-webkit-scrollbar-track { background: transparent; }
  .rw-timeline::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 9999px; }
</style>
</head>
<body>

<!-- ═══ Persistent Header ═══ -->
<header id="appHeader">
  <div class="header-left">
    <h1>Feedbacks</h1>
  </div>
  <div class="header-right">
    <span class="header-status" id="headerSttStatus">
      <span class="check-dot" id="headerSttDot"></span>
      <span id="headerSttLabel">STT</span>
    </span>
    <span class="header-status" id="headerMicStatus">
      <span class="check-dot" id="headerMicDot"></span>
      <span id="headerMicLabel">Mic</span>
    </span>
    <span id="headerRecIndicator">
      <span class="rec-dot"></span>
      <span id="headerRecTime">0:00</span>
      <button id="headerStopBtn" onclick="stopSession()">Stop</button>
    </span>
    <div class="split-btn">
      <button id="newCaptureBtn" onclick="startSession()">New Capture</button>
      <button id="newCaptureDropdown" onclick="showCapturePrompt()" aria-label="New capture with ticket ID">&#x25BE;</button>
    </div>
  </div>
</header>

<!-- ═══ Capture Start Prompt ═══ -->
<div id="capturePrompt">
  <span class="capture-prompt-label">New capture</span>
  <input type="text" id="captureTicketId" placeholder="Ticket ID (optional)" maxlength="20" autocomplete="off" spellcheck="false" />
  <button onclick="startSession()">Start recording</button>
  <button onclick="hideCapturePrompt()">Cancel</button>
</div>

<!-- ═══ Recorder Widget (compact mode for popup embeds) ═══ -->
<div id="recorderWidget">
  <div class="rw-header">
    <span class="rw-dot" id="rwDot"></span>
    <span class="rw-time" id="rwTime">0:00</span>
    <span class="rw-ticket" id="rwTicket"></span>
  </div>
  <div class="rw-meter-row">
    <div class="mic-bars large" id="rwMicBars">
      <div class="mic-bar" style="height:2px"></div>
      <div class="mic-bar" style="height:2px"></div>
      <div class="mic-bar" style="height:2px"></div>
      <div class="mic-bar" style="height:2px"></div>
      <div class="mic-bar" style="height:2px"></div>
    </div>
    <div class="rw-stats">
      <span id="rwImgCount">0 img</span>
      <span id="rwSttCount">0/0 stt</span>
      <span class="stt-activity" id="rwSttActivity"></span>
    </div>
  </div>
  <div class="rw-timeline timeline-feed" id="rwTimeline"></div>
  <div class="rw-controls">
    <button id="rwStartBtn" class="rw-btn rw-start" onclick="rwStart()">Start Recording</button>
    <button id="rwStopBtn" class="rw-btn rw-stop" onclick="rwStop()">Finish</button>
  </div>
  <div class="rw-status" id="rwStatus"></div>
  <div class="rw-indicator">
    <div class="rw-indicator-stt" id="rwSttBar"></div>
    <div class="rw-indicator-rec" id="rwRecBar"></div>
  </div>
</div>

<!-- ═══ Session List ═══ -->
<div id="sessionList">
  <div id="emptyState">
    <div class="empty-icon">&#x25A3;</div>
    <p class="empty-title">No sessions yet</p>
    <p class="empty-desc">Capture screen and voice together. Sessions are saved locally and ready for LLM review.</p>
    <button class="empty-cta" onclick="startSession()">+ New Capture</button>
  </div>
  <!-- Live row and past session rows rendered by JS -->
</div>

<!-- Diagnostics -->
<div class="diagnostics">
  <details>
    <summary>Diagnostics</summary>
    <div class="diag-summary" id="diagSummary">--</div>
    <div class="log" id="log"></div>
  </details>
</div>

<!-- Hidden video for getDisplayMedia -->
<video id="captureVideo" autoplay muted playsinline></video>

<script>
// ── Recorder widget query params (parsed early so mode flag is available everywhere) ──
const _params = new URLSearchParams(location.search);
const RECORDER_MODE = _params.get('mode') === 'recorder';
const RECORDER_AUTOSTART = _params.get('autostart') === '1';
const RECORDER_AUTOCLOSE = _params.has('autoclose') ? _params.get('autoclose') !== '0' : RECORDER_MODE;
const RECORDER_ORIGIN = _params.get('origin') || '*';
const RECORDER_TITLE = _params.get('title') || '';

// ── Session state factory ──
function createSession() {
  return {
    id: null,               // set after save, e.g. "feedbacks-2026-03-30-20-51-26"
    startTime: 0,
    ticketId: '',           // captured at start, not read from DOM later
    screenshots: [],
    transcriptSegments: [],
    pendingTranscriptions: [],
    chunkCount: 0,
    transcribedCount: 0,
    dedupCount: 0,
    lastFrameData: null,
    isRecording: false,
    speechSpans: [],          // [{start, end, chunkNum}] — VAD-detected speech boundaries
    zipBlob: null,
    savedPath: '',
    timelineEl: null,       // DOM container for this session's timeline
    status: 'recording',    // recording | transcribing | summarizing | done
    // Interval/timer IDs
    durationIntervalId: null,
    screenshotIntervalId: null,
    chunkRotationId: null,
    statusStripIntervalId: null,
  };
}
let currentSession = null;  // The active/most-recent session
let liveSeqNum = 0;         // Monotonic counter for live-push events
let liveSessionId = null;   // Set at capture start for live-push

// Fire-and-forget: push incremental events to server for MCP bridge
function pushLiveUpdate(type, data) {
  if (!liveSessionId) return;
  liveSeqNum++;
  const elapsed = currentSession ? (Date.now() - currentSession.startTime) / 1000 : 0;
  fetch('/live-push', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sessionId: liveSessionId,
      type,
      seqNum: liveSeqNum,
      offsetTime: elapsed,
      data,
    }),
  }).catch(() => {}); // fire-and-forget
}

// ── Page-level globals (NOT per-session) ──
let screenStream = null;
let sessionStartTime = 0;   // mirrored into session.startTime at start
let captureInProgress = false;
let micAudioCtx = null;
let micAnalyser = null;
let micMeterRafId = null;

// Whisper connection state
let whisperLocal = false;
let whisperCheckId = null;
const WHISPER_LOCAL_URL = 'http://localhost:8081';
const CHUNK_DURATION = 10000; // 10 seconds
const CAPTURE_INTERVAL = 1000; // auto-screenshot every second, dedup filters unchanged frames

// Chunked audio globals (device-level, not per-session)
let chunkRecorder = null;
let chunkAudioParts = [];
let chunkStartTime = 0;

// Mic stream (may be started in setup for preview)
let micStreamRef = null;

// ── Voice Activity Detection (VAD) ──
let isSpeaking = false;
let speechOnsetTime = 0;       // Date.now() when energy first exceeded threshold
let speechOffsetTime = 0;      // Date.now() when energy first dropped below threshold
// Known whisper hallucination phrases — case-insensitive, punctuation-stripped
const HALLUCINATION_BLOCKLIST = new Set([
  'thank you', 'thanks for watching', 'thank you for watching',
  'please subscribe', 'like and subscribe', 'subscribe to my channel',
  'thanks for listening', 'thank you for listening',
  'please visit www.sales.com for more information',
  'see you next time', 'see you in the next video',
  'bye', 'goodbye', 'bye bye',
  'you', 'the end', 'so',
  'thanks', 'okay', 'um', 'uh',
  'music', 'applause', 'laughter',
  'subtitle by', 'subtitles by', 'captions by',
  'translated by', 'transcribed by',
  'user is describing what they see on screen',
  'user is currently working and should be functioning fine',
]);

const SPEECH_THRESHOLD = 25;   // avg frequency bin value (0-255) to trigger speech
const SPEECH_ONSET_MS = 300;   // energy must exceed threshold for this long to confirm speech
const SPEECH_OFFSET_MS = 1500; // energy must be below threshold for this long to confirm silence
const MAX_SPEECH_CHUNK_MS = 30000; // force chunk rotation after 30s of continuous speech

// ── Elements ──
const $ = id => document.getElementById(id);

// ── Logging ──
const logHistory = [];
function log(msg, cls = '') {
  const ts = new Date().toLocaleTimeString();
  const entry = `[${ts}] ${msg}`;
  logHistory.push(entry);
  const el = $('log');
  if (!el) return;
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = entry;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// ── Session List UI ──
let expandedSessionName = null;
let loadedSessions = [];  // cached from last GET /sessions

function showCapturePrompt() {
  $('capturePrompt').classList.add('active');
  $('captureTicketId').value = '';
  $('captureTicketId').focus();
}

function hideCapturePrompt() {
  $('capturePrompt').classList.remove('active');
}

async function loadSessions() {
  try {
    const resp = await fetch('/sessions');
    loadedSessions = await resp.json();
  } catch (e) {
    loadedSessions = [];
  }
  renderSessionList();
}

function renderSessionList() {
  const list = $('sessionList');
  list.querySelectorAll('.session-row:not(.live)').forEach(el => el.remove());

  const emptyState = $('emptyState');
  const liveRow = list.querySelector('.session-row.live');

  if (loadedSessions.length === 0 && !liveRow) {
    emptyState.style.display = '';
  } else {
    emptyState.style.display = 'none';
  }

  loadedSessions.forEach(session => {
    const row = createSessionRow(session);
    list.appendChild(row);
  });
}

function createEl(tag, cls, text) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}

function createSessionRow(session) {
  const row = createEl('div', 'session-row collapsed');
  row.dataset.sessionName = session.name;
  row.setAttribute('role', 'button');
  row.setAttribute('tabindex', '0');
  row.setAttribute('aria-expanded', 'false');
  row.setAttribute('aria-controls', 'detail-' + session.name);

  // Parse date from session.date, session.startTime, or directory name
  // Directory name format: feedbacks-2026-03-30-20-51-26
  let date = session.date ? new Date(session.date)
           : session.startTime ? new Date(session.startTime)
           : null;
  if (!date || isNaN(date.getTime())) {
    // Parse from name: feedbacks-YYYY-MM-DD-HH-mm-ss
    const m = session.name.match(/feedbacks-(\d{4})-(\d{2})-(\d{2})-(\d{2})-(\d{2})-(\d{2})/);
    if (m) {
      date = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]);
    } else {
      date = new Date();
    }
  }
  const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
                  date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const stats = [session.duration, (session.imageCount || 0) + ' img', (session.sttCount || 0) + ' stt']
    .filter(Boolean).join(' · ');
  const summary = session.summary || 'No summary available';
  const sessionPath = session.path || ('sessions/' + session.name);

  // Row header
  const rowHeader = createEl('div', 'session-row-header');

  // Hero image or placeholder
  if (session.heroImage) {
    const img = createEl('img', 'row-hero');
    img.src = '/sessions/' + session.name + '/images/' + session.heroImage;
    img.alt = '';
    rowHeader.appendChild(img);
  } else {
    rowHeader.appendChild(createEl('div', 'row-hero-placeholder', '--'));
  }

  // Row info
  const rowInfo = createEl('div', 'row-info');
  const line1 = createEl('div', 'row-info-line1');

  if (session.status) {
    const badge = createEl('span', 'status-badge ' + session.status);
    const dot = createEl('span', 'status-dot ' + session.status);
    badge.appendChild(dot);
    const labels = { recording: 'Recording', transcribing: 'Transcribing', summarizing: 'Summarizing', done: 'Done', pending: 'Processing' };
    badge.appendChild(document.createTextNode(labels[session.status] || session.status));
    line1.appendChild(badge);
  }
  line1.appendChild(createEl('span', 'row-timestamp', dateStr));
  if (session.ticketId) {
    line1.appendChild(createEl('span', 'ticket-badge', session.ticketId));
  }
  line1.appendChild(createEl('span', 'row-stats', stats));
  rowInfo.appendChild(line1);
  rowInfo.appendChild(createEl('div', 'row-info-line2', summary));
  rowHeader.appendChild(rowInfo);
  rowHeader.appendChild(createEl('span', 'row-chevron', '\u25B8'));
  row.appendChild(rowHeader);

  // Session detail (collapsed by default via CSS)
  const detail = createEl('div', 'session-detail');
  detail.id = 'detail-' + session.name;

  const detailSummary = createEl('div', 'detail-summary');
  if (session.heroImage) {
    const heroImg = createEl('img', 'detail-hero');
    heroImg.src = '/sessions/' + session.name + '/images/' + session.heroImage;
    heroImg.alt = '';
    detailSummary.appendChild(heroImg);
  }
  const detailInfo = createEl('div', 'detail-info');
  detailInfo.appendChild(createEl('div', 'detail-summary-text', session.summary || 'No summary available'));
  detailInfo.appendChild(createEl('div', 'detail-path', sessionPath));

  const detailActions = createEl('div', 'detail-actions');
  const copyPathBtn = createEl('button', '', 'Copy path');
  copyPathBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    copySessionPath(session.name, sessionPath);
  });
  const openPlayerBtn = createEl('button', '', 'Open player');
  openPlayerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    openPlayer(session.name);
  });
  detailActions.appendChild(copyPathBtn);
  detailActions.appendChild(openPlayerBtn);
  detailInfo.appendChild(detailActions);
  detailSummary.appendChild(detailInfo);
  detail.appendChild(detailSummary);

  const detailTimeline = createEl('div', 'detail-timeline');
  detailTimeline.id = 'timeline-' + session.name;
  detail.appendChild(detailTimeline);
  row.appendChild(detail);

  // Click handling with double-click support
  let clickTimer = null;
  rowHeader.addEventListener('click', () => {
    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
      copySessionPath(session.name, sessionPath);
      return;
    }
    clickTimer = setTimeout(() => {
      clickTimer = null;
      toggleSessionRow(session.name);
    }, 250);
  });

  row.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleSessionRow(session.name);
    }
  });

  if (expandedSessionName === session.name) {
    row.classList.remove('collapsed');
    row.classList.add('expanded');
    row.setAttribute('aria-expanded', 'true');
    loadSessionTimeline(session.name);
  }

  return row;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toggleSessionRow(name) {
  if (expandedSessionName === name) {
    collapseAllRows();
    return;
  }
  collapseAllRows();
  expandSessionRow(name);
}

function expandSessionRow(name) {
  expandedSessionName = name;
  const row = document.querySelector('.session-row[data-session-name="' + name + '"]');
  if (!row) return;
  row.classList.remove('collapsed');
  row.classList.add('expanded');
  row.setAttribute('aria-expanded', 'true');

  document.querySelectorAll('.session-row:not(.live)').forEach(r => {
    if (r.dataset.sessionName !== name) r.classList.add('dimmed');
  });

  loadSessionTimeline(name);
}

function collapseAllRows() {
  expandedSessionName = null;
  document.querySelectorAll('.session-row').forEach(r => {
    r.classList.remove('expanded', 'dimmed');
    if (!r.classList.contains('live')) r.classList.add('collapsed');
    r.setAttribute('aria-expanded', 'false');
  });
}

async function loadSessionTimeline(name) {
  const timeline = document.getElementById('timeline-' + name);
  if (!timeline || timeline.dataset.loaded) return;
  timeline.dataset.loaded = 'true';

  const session = loadedSessions.find(s => s.name === name);
  if (!session) return;

  // Use structured timeline data if available (from parsed session.md)
  if (session.timeline && session.timeline.length > 0) {
    session.timeline.forEach((seg, i) => {
      const isContext = seg.context;  // true for [context] silence sections
      const entry = createEl('div', 'tl-entry' + (isContext ? ' tl-context' : ''));

      // Timeline dot connector
      const dot = createEl('div', 'tl-dot');
      entry.appendChild(dot);

      // Timestamp
      const timeStr = seg.time + (seg.timeEnd ? ' – ' + seg.timeEnd : '');
      const tsEl = createEl('div', 'tl-timestamp', timeStr);
      if (isContext) tsEl.textContent += ' [context]';
      entry.appendChild(tsEl);

      // Content: screenshot + transcript side by side
      const content = createEl('div', 'tl-content');

      if (seg.image) {
        const img = createEl('img', 'tl-screenshot');
        img.src = '/sessions/' + name + '/images/' + seg.image;
        img.alt = 'Screenshot ' + (i + 1);
        img.loading = 'lazy';
        content.appendChild(img);
      }

      if (seg.transcript) {
        const transcript = createEl('div', 'tl-transcript');
        transcript.textContent = '\u201c' + seg.transcript + '\u201d';
        content.appendChild(transcript);
      } else if (seg.marker) {
        const marker = createEl('div', 'tl-marker-info');
        marker.textContent = 'Marker ' + seg.marker.number + ' — ' + seg.marker.description;
        content.appendChild(marker);
      }

      entry.appendChild(content);
      timeline.appendChild(entry);
    });
  } else {
    // Fallback: just show images (no session.md data available)
    for (let i = 1; i <= (session.imageCount || 0); i++) {
      const filename = String(i).padStart(3, '0') + '.png';
      const entry = createEl('div', 'tl-entry');
      entry.appendChild(createEl('div', 'tl-dot'));
      const content = createEl('div', 'tl-content');
      const img = createEl('img', 'tl-screenshot');
      img.src = '/sessions/' + name + '/images/' + filename;
      img.alt = 'Screenshot ' + i;
      img.loading = 'lazy';
      content.appendChild(img);
      entry.appendChild(content);
      timeline.appendChild(entry);
    }
  }
}

function copySessionPath(name, path) {
  const text = path || name;
  const doFeedback = () => {
    const row = document.querySelector('.session-row[data-session-name="' + name + '"]');
    if (row) {
      const chevron = row.querySelector('.row-chevron');
      if (chevron) {
        const orig = chevron.textContent;
        chevron.textContent = '\u2713';
        setTimeout(() => { chevron.textContent = orig; }, 1500);
      }
    }
  };
  navigator.clipboard.writeText(text).then(doFeedback).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    doFeedback();
  });
}

// ── Mic level meter ──
function initMicPreview() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    window._previewMicStream = stream;
    micStreamRef = stream;
    const dot = $('headerMicDot');
    const label = $('headerMicLabel');
    if (dot) dot.className = 'check-dot green';
    if (label) label.textContent = 'Mic';
    startMicMeter(stream);
  }).catch(err => {
    log('Mic access denied: ' + err.message, 'error');
    const dot = $('headerMicDot');
    const label = $('headerMicLabel');
    if (dot) dot.className = 'check-dot red';
    if (label) label.textContent = 'Mic off';
  });
}

function startMicMeter(stream) {
  if (micAudioCtx) micAudioCtx.close().catch(() => {});
  micAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  micAnalyser = micAudioCtx.createAnalyser();
  micAnalyser.fftSize = 64;
  const source = micAudioCtx.createMediaStreamSource(stream);
  source.connect(micAnalyser);

  const dataArray = new Uint8Array(micAnalyser.frequencyBinCount);

  function animate() {
    micMeterRafId = requestAnimationFrame(animate);
    micAnalyser.getByteFrequencyData(dataArray);

    // Update mic bars (live row + recorder widget)
    const barContainers = [].concat($('micBarsLive') || [], $('rwMicBars') || []);
    for (const liveBars of barContainers) {
      const bars = liveBars.querySelectorAll('.mic-bar');
      const binCount = bars.length;
      for (let i = 0; i < binCount; i++) {
        const binIndex = Math.floor(i * dataArray.length / binCount);
        const val = dataArray[binIndex] || 0;
        const h = Math.max(2, Math.round(val / 255 * 14));
        bars[i].style.height = h + 'px';
        bars[i].className = 'mic-bar' + (val > 20 ? ' active' : '');
      }
    }

    // ── Voice Activity Detection ──
    if (currentSession && currentSession.isRecording && sessionStartTime) {
      const avgEnergy = dataArray.reduce((sum, v) => sum + v, 0) / dataArray.length;
      const now = Date.now();

      if (!isSpeaking) {
        if (avgEnergy > SPEECH_THRESHOLD) {
          if (!speechOnsetTime) speechOnsetTime = now;
          if (now - speechOnsetTime >= SPEECH_ONSET_MS) {
            isSpeaking = true;
            speechOffsetTime = 0;
            const spanStart = (speechOnsetTime - sessionStartTime) / 1000;
            onSpeechStart(spanStart);
          }
        } else {
          speechOnsetTime = 0;
        }
      } else {
        if (avgEnergy < SPEECH_THRESHOLD) {
          if (!speechOffsetTime) speechOffsetTime = now;
          if (now - speechOffsetTime >= SPEECH_OFFSET_MS) {
            isSpeaking = false;
            speechOnsetTime = 0;
            const spanEnd = (speechOffsetTime - sessionStartTime) / 1000;
            onSpeechEnd(spanEnd);
            speechOffsetTime = 0;
          }
        } else {
          speechOffsetTime = 0;
        }
      }
    }
  }
  animate();
}

function stopMicMeter() {
  if (micMeterRafId) cancelAnimationFrame(micMeterRafId);
  micMeterRafId = null;
  if (micAudioCtx) micAudioCtx.close().catch(() => {});
  micAudioCtx = null;
  micAnalyser = null;
}

// ── Voice Activity Detection — speech event handlers ──

function onSpeechStart(startTime) {
  if (!currentSession || !currentSession.isRecording) return;

  // Start a new audio chunk if one isn't already recording
  if (!chunkRecorder || chunkRecorder.state !== 'recording') {
    startChunkRecording(micStreamRef);
  }

  currentSession.speechSpans.push({ start: startTime, end: null, chunkNum: currentSession.chunkCount + 1 });
  pushLiveUpdate('speech_start', { startTime });
  updateSpeechIndicator(true);
  log(`Speech started at ${formatTime(startTime)}`, 'info');
}

function onSpeechEnd(endTime) {
  if (!currentSession || !currentSession.isRecording) return;

  // Close the current speech span
  const spans = currentSession.speechSpans;
  if (spans.length > 0 && spans[spans.length - 1].end === null) {
    spans[spans.length - 1].end = endTime;
    pushLiveUpdate('speech_end', { startTime: spans[spans.length - 1].start, endTime });
  }

  // Finalize the audio chunk — send to whisper
  rotateChunkForSpeech();
  updateSpeechIndicator(false);
  log(`Speech ended at ${formatTime(endTime)} — sending to whisper`, 'info');
}

function rotateChunkForSpeech() {
  // Like rotateChunk() but does NOT start a new chunk after stopping.
  // A new chunk starts only when speech is detected again (onSpeechStart).
  if (!chunkRecorder || chunkRecorder.state !== 'recording') return;
  if (!currentSession) return;

  const partsSnapshot = chunkAudioParts;
  const startSnapshot = chunkStartTime;
  currentSession.chunkCount++;
  const chunkNum = currentSession.chunkCount;
  const session = currentSession;

  insertSTTPlaceholder(chunkNum, startSnapshot, session.timelineEl);

  chunkRecorder.stop();
  const finalizePromise = new Promise(resolve => {
    chunkRecorder.onstop = () => {
      const mimeType = getSupportedMimeType();
      const ext = mimeType.includes('webm') ? 'webm' : mimeType.includes('mp4') ? 'mp4' : 'ogg';
      const blob = new Blob(partsSnapshot, { type: mimeType });

      if (blob.size < 1000) {
        log(`Chunk ${chunkNum} too small (${blob.size}B), skipping`, 'info');
        resolve();
        return;
      }

      const transcriptionPromise = transcribeChunk(blob, ext, startSnapshot, chunkNum, session);
      session.pendingTranscriptions.push(transcriptionPromise);
      transcriptionPromise.then(resolve);
    };
  });

  // Do NOT start a new chunk — wait for next speech onset
  chunkRecorder = null;
  chunkAudioParts = [];

  return finalizePromise;
}

function updateSpeechIndicator(speaking) {
  const liveRow = document.querySelector('.session-row.live');
  if (liveRow) {
    liveRow.classList.toggle('speaking', speaking);
  }
  // Also update mic bars container for visual feedback
  const micBars = $('micBarsLive');
  if (micBars) {
    micBars.classList.toggle('speaking', speaking);
  }
  // Recorder widget mic bars
  const rwBars = $('rwMicBars');
  if (rwBars) {
    rwBars.classList.toggle('speaking', speaking);
  }
}

// ── Timeline ──
function insertTimelineEntry(type, timestamp, label, imgSrc, container) {
  const feed = container;
  if (!feed) { log('insertTimelineEntry: no container', 'error'); return; }

  const entry = document.createElement('div');
  entry.className = 'tl-entry';
  entry.dataset.timestamp = timestamp;

  const time = document.createElement('span');
  time.className = 'tl-time';
  time.textContent = formatTime(timestamp);
  entry.appendChild(time);

  const badge = document.createElement('span');
  badge.className = 'tl-badge ' + (type === 'img' ? 'img' : 'stt');
  badge.textContent = type === 'img' ? 'IMG' : 'STT';
  entry.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'tl-body';

  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    body.appendChild(img);
  }
  if (label) {
    const text = document.createElement('span');
    text.className = 'tl-text';
    text.textContent = label;
    body.appendChild(text);
  }

  entry.appendChild(body);

  // Insert in sorted order by timestamp
  const existing = feed.querySelectorAll('.tl-entry');
  let inserted = false;
  for (let i = existing.length - 1; i >= 0; i--) {
    if (parseFloat(existing[i].dataset.timestamp) <= timestamp) {
      existing[i].after(entry);
      inserted = true;
      break;
    }
  }
  if (!inserted) feed.prepend(entry);

  // Auto-scroll if near bottom
  const isNearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100;
  if (isNearBottom) feed.scrollTop = feed.scrollHeight;
}

function insertSTTPlaceholder(chunkNum, offsetTime, container) {
  const feed = container;
  if (!feed) { log('insertSTTPlaceholder: no container', 'error'); return; }

  const entry = document.createElement('div');
  entry.className = 'tl-entry pending';
  entry.dataset.timestamp = offsetTime;
  entry.dataset.chunkNum = chunkNum;

  const time = document.createElement('span');
  time.className = 'tl-time';
  time.textContent = formatTime(offsetTime);
  entry.appendChild(time);

  const badge = document.createElement('span');
  badge.className = 'tl-badge stt';
  badge.textContent = 'STT';
  entry.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'tl-body';
  const text = document.createElement('span');
  text.className = 'tl-text';
  text.textContent = 'transcribing...';
  body.appendChild(text);
  entry.appendChild(body);

  // Insert in sorted order
  const existing = feed.querySelectorAll('.tl-entry');
  let inserted = false;
  for (let i = existing.length - 1; i >= 0; i--) {
    if (parseFloat(existing[i].dataset.timestamp) <= offsetTime) {
      existing[i].after(entry);
      inserted = true;
      break;
    }
  }
  if (!inserted) feed.prepend(entry);

  const isNearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100;
  if (isNearBottom) feed.scrollTop = feed.scrollHeight;
}

function replaceSTTPlaceholder(chunkNum, transcriptText, offsetTime, container, endTime) {
  const feed = container;
  if (!feed) { log('replaceSTTPlaceholder: no container', 'error'); return; }

  const isFiltered = transcriptText && transcriptText.startsWith('\u26a0');
  const placeholder = feed.querySelector(`.tl-entry[data-chunk-num="${chunkNum}"]`);
  if (placeholder) {
    placeholder.classList.remove('pending');
    if (isFiltered) placeholder.classList.add('filtered');
    const textEl = placeholder.querySelector('.tl-text');
    if (textEl) textEl.textContent = transcriptText || '(no speech detected)';
    // Update time display to show range
    const timeEl = placeholder.querySelector('.tl-time');
    if (timeEl && endTime != null) {
      timeEl.textContent = formatTime(offsetTime) + ' – ' + formatTime(endTime);
    }
  } else {
    insertTimelineEntry('stt', offsetTime, transcriptText || '(no speech detected)', null, feed);
  }
}

// ── STT activity indicator ──
let _sttActiveCount = 0;
let _sttFlashTimer = null;

function sttActivityShow() {
  _sttActiveCount++;
  const els = [document.getElementById('liveSttActivity'), document.getElementById('rwSttActivity')];
  for (const el of els) {
    if (!el) continue;
    el.classList.remove('stt-done');
    el.classList.add('visible');
    // Ensure dots + text are present (widget element starts empty)
    if (!el.querySelector('.stt-dots')) {
      const dots = document.createElement('span');
      dots.className = 'stt-dots';
      for (let i = 0; i < 3; i++) dots.appendChild(document.createElement('span'));
      el.appendChild(dots);
    }
    let textEl = el.querySelector('.stt-text');
    if (!textEl) {
      textEl = document.createElement('span');
      textEl.className = 'stt-text';
      el.appendChild(textEl);
    }
    textEl.textContent = 'Transcribing...';
  }
  // Blue STT bar in widget
  const sttBar = document.getElementById('rwSttBar');
  if (sttBar) sttBar.classList.add('active');
}

function sttActivityDone(text) {
  _sttActiveCount = Math.max(0, _sttActiveCount - 1);
  // Show brief flash of result
  const preview = text && text.length > 0 && !text.startsWith('(')
    ? '\u2713 ' + (text.length > 30 ? text.slice(0, 30) + '\u2026' : text)
    : '\u2713 Done';
  const els = [document.getElementById('liveSttActivity'), document.getElementById('rwSttActivity')];
  for (const el of els) {
    if (!el) continue;
    const textEl = el.querySelector('.stt-text');
    if (textEl) textEl.textContent = preview;
    el.classList.add('stt-done');
    // Hide dots during flash
    const dots = el.querySelector('.stt-dots');
    if (dots) dots.style.display = 'none';
  }
  // After flash, either show next active transcription or hide
  clearTimeout(_sttFlashTimer);
  _sttFlashTimer = setTimeout(() => {
    for (const el of els) {
      if (!el) continue;
      const dots = el.querySelector('.stt-dots');
      if (_sttActiveCount > 0) {
        el.classList.remove('stt-done');
        if (dots) dots.style.display = '';
        const textEl = el.querySelector('.stt-text');
        if (textEl) textEl.textContent = 'Transcribing...';
      } else {
        el.classList.remove('visible', 'stt-done');
        if (dots) dots.style.display = '';
      }
    }
    // Hide blue STT bar when no active transcriptions
    if (_sttActiveCount === 0) {
      const sttBar = document.getElementById('rwSttBar');
      if (sttBar) sttBar.classList.remove('active');
    }
  }, 1500);
}
